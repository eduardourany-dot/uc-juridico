<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>UC Jurídico · Urany de Castro Advocacia</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="UC Jurídico">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<meta name="description" content="Urany de Castro Advocacia · Suite jurídica para gestão e análise de processos. 100% local.">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/diff@5.2.0/dist/diff.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="config.js"></script>
<script type="module" src="api.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --uc-black:#0a0a0a; --uc-graphite:#1f1f1f; --uc-warm-gray:#6b6b68; --uc-soft-gray:#9b9b96;
  --uc-paper:#fafaf7; --uc-cream:#f4f1e8; --uc-line:#d4cfc0; --uc-line-soft:#e8e3d4;
  --uc-gold:#8a6f3d; --uc-gold-soft:#c9b687; --uc-gold-pale:#f0e9d6;
  --uc-red:#a8472d; --uc-red-soft:#f3d8cf; --uc-amber:#b87f1c; --uc-amber-soft:#f5e3c4;
  --uc-green:#4a7c4a; --uc-green-soft:#d4e8d4;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.04); --shadow-md:0 4px 12px rgba(0,0,0,0.06); --shadow-lg:0 12px 30px rgba(0,0,0,0.08);
}
[data-theme="dark"] {
  --uc-black:#f5f3ee; --uc-graphite:#d4d0c8; --uc-warm-gray:#a8a39a; --uc-soft-gray:#6b6b66;
  --uc-paper:#16140f; --uc-cream:#221f18; --uc-line:#3a3528; --uc-line-soft:#2a2620;
  --uc-gold:#c9b687; --uc-gold-soft:#8a6f3d; --uc-gold-pale:#2a2418;
  --uc-red-soft:#4a2418; --uc-amber-soft:#3a2c14; --uc-green-soft:#1f3522;
}
*{font-family:'Inter',system-ui,-apple-system,sans-serif;box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{background:var(--uc-paper);color:var(--uc-graphite);font-size:15px;-webkit-font-smoothing:antialiased}
.font-serif{font-family:'EB Garamond','Times New Roman',serif}
.smallcaps{font-variant:small-caps;letter-spacing:0.08em}

.app-shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
@media(max-width:768px){.app-shell{grid-template-columns:1fr;padding-bottom:70px}.sidebar{display:none !important}.mobile-nav{display:flex !important}}
.sidebar{background:white;border-right:1px solid var(--uc-line);padding:20px 0;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
[data-theme="dark"] .sidebar{background:#1c1a14}
.sidebar-logo{padding:0 20px 20px;border-bottom:1px solid var(--uc-line-soft);margin-bottom:16px}
.sidebar-logo img{width:100%;max-width:180px}
[data-theme="dark"] .sidebar-logo img{filter:invert(1) brightness(0.95)}
.nav-section{padding:8px 12px 4px;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--uc-warm-gray)}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 20px;color:var(--uc-graphite);text-decoration:none;border-left:3px solid transparent;transition:all 0.15s;cursor:pointer;font-size:14px}
.nav-item:hover{background:var(--uc-cream)}
.nav-item.active{background:var(--uc-cream);border-left-color:var(--uc-gold);color:var(--uc-black);font-weight:600}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--uc-red);color:white;font-size:10px;padding:2px 6px;border-radius:10px;font-weight:600}
.nav-badge.amber{background:var(--uc-amber)} .nav-badge.gray{background:var(--uc-warm-gray)}

.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--uc-line);padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:50;justify-content:space-around;box-shadow:0 -2px 12px rgba(0,0,0,0.05)}
[data-theme="dark"] .mobile-nav{background:#1c1a14}
.mobile-nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--uc-warm-gray);padding:6px 4px;flex:1;min-width:0;text-align:center;cursor:pointer;border-radius:8px;transition:all 0.15s}
.mobile-nav-item.active{color:var(--uc-gold);background:var(--uc-cream)}
.mobile-nav-item svg{width:20px;height:20px}
.mobile-nav-item span{font-size:10px;font-weight:500}

.main-content{padding:24px 32px 60px;max-width:1400px;margin:0 auto;width:100%}
@media(max-width:768px){.main-content{padding:16px 16px 30px}}

.page-header{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--uc-line)}
.page-title{font-family:'EB Garamond',serif;font-size:28px;font-weight:600;color:var(--uc-black);margin:0;line-height:1.2}
.page-title .smallcaps-prefix{font-variant:small-caps;letter-spacing:0.06em;color:var(--uc-gold);margin-right:8px}
.page-subtitle{font-family:'EB Garamond',serif;font-style:italic;color:var(--uc-warm-gray);font-size:15px;margin:4px 0 0}

.card{background:white;border:1px solid var(--uc-line);border-radius:8px;padding:20px;transition:all 0.2s}
[data-theme="dark"] .card{background:#1c1a14}
.card-hover:hover{border-color:var(--uc-gold);box-shadow:var(--shadow-md);transform:translateY(-2px);cursor:pointer}
.card-elevated{box-shadow:var(--shadow-md)}
.card-gold-border{border-top:3px solid var(--uc-gold)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:8px;font-weight:500;font-size:14px;cursor:pointer;border:1px solid transparent;transition:all 0.15s;font-variant:small-caps;letter-spacing:0.06em}
.btn-primary{background:var(--uc-black);color:white;border-color:var(--uc-black)}
.btn-primary:hover{background:var(--uc-graphite)}
[data-theme="dark"] .btn-primary{color:#0a0a0a}
.btn-secondary{background:var(--uc-gold);color:white;border-color:var(--uc-gold)}
.btn-secondary:hover{background:#6f5930}
.btn-outline{background:white;color:var(--uc-graphite);border-color:var(--uc-line)}
.btn-outline:hover{border-color:var(--uc-gold);color:var(--uc-black)}
[data-theme="dark"] .btn-outline{background:transparent}
.btn-ghost{background:transparent;color:var(--uc-graphite)}
.btn-ghost:hover{background:var(--uc-cream)}
.btn-danger{background:var(--uc-red);color:white;border-color:var(--uc-red)}
.btn-danger:hover{filter:brightness(0.9)}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-icon-only{padding:8px}
.btn-full{width:100%}
.btn:disabled{opacity:0.5;cursor:not-allowed}

.input,.select,.textarea{width:100%;padding:10px 12px;border:1px solid var(--uc-line);border-radius:6px;background:white;color:var(--uc-graphite);font-size:14px;font-family:inherit}
[data-theme="dark"] .input,[data-theme="dark"] .select,[data-theme="dark"] .textarea{background:#221f18}
.input:focus,.select:focus,.textarea:focus{outline:none;border-color:var(--uc-gold);box-shadow:0 0 0 3px var(--uc-gold-pale)}
.label{display:block;font-weight:600;font-size:13px;color:var(--uc-black);margin-bottom:6px}
.help-text{font-size:12px;color:var(--uc-warm-gray);margin-top:4px}

.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;font-variant:small-caps;letter-spacing:0.06em}
.badge-gold{background:var(--uc-gold-pale);color:var(--uc-gold);border:1px solid var(--uc-gold-soft)}
.badge-red{background:var(--uc-red-soft);color:var(--uc-red)}
.badge-amber{background:var(--uc-amber-soft);color:var(--uc-amber)}
.badge-green{background:var(--uc-green-soft);color:var(--uc-green)}
.badge-gray{background:var(--uc-cream);color:var(--uc-warm-gray);border:1px solid var(--uc-line)}
.badge-flagship{background:var(--uc-black);color:var(--uc-gold-soft)}
[data-theme="dark"] .badge-flagship{background:var(--uc-gold);color:#0a0a0a}

.stat-card{background:var(--uc-cream);border:1px solid var(--uc-line);border-radius:8px;padding:16px}
.stat-label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--uc-warm-gray);margin-bottom:4px}
.stat-value{font-family:'EB Garamond',serif;font-size:28px;font-weight:600;color:var(--uc-black);line-height:1}
.stat-meta{font-size:12px;color:var(--uc-warm-gray);margin-top:4px}

.gold-divider{height:2px;background:linear-gradient(90deg,transparent,var(--uc-gold),transparent);margin:24px 0}

.drop-zone{border:2px dashed var(--uc-line);background:white;border-radius:8px;padding:32px 16px;text-align:center;cursor:pointer;transition:all 0.2s}
[data-theme="dark"] .drop-zone{background:#1c1a14}
.drop-zone.dragover{border-color:var(--uc-gold);background:var(--uc-cream)}

.spinner{border:3px solid var(--uc-line);border-top-color:var(--uc-gold);border-radius:50%;width:22px;height:22px;animation:spin 1s linear infinite}
.spinner-mini{display:inline-block;border:2px solid var(--uc-line);border-top-color:var(--uc-gold);border-radius:50%;width:12px;height:12px;animation:spin 1s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn 0.15s}
.modal{background:var(--uc-paper);border:1px solid var(--uc-line);border-top:3px solid var(--uc-gold);border-radius:8px;padding:24px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
[data-theme="dark"] .modal{background:#1c1a14}
.modal-title{font-family:'EB Garamond',serif;font-size:20px;font-weight:600;color:var(--uc-black);margin:0 0 16px}

.toast-container{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;max-width:calc(100vw - 40px)}
.toast{background:white;border:1px solid var(--uc-line);border-left:3px solid var(--uc-gold);border-radius:6px;padding:12px 16px;box-shadow:var(--shadow-md);max-width:360px;animation:fadeIn 0.2s}
[data-theme="dark"] .toast{background:#1c1a14}
.toast.success{border-left-color:var(--uc-green)}
.toast.error{border-left-color:var(--uc-red)}
.toast-title{font-weight:600;font-size:13px;color:var(--uc-black);margin-bottom:2px}
.toast-msg{font-size:12px;color:var(--uc-warm-gray)}

.tabs{display:flex;gap:4px;padding:4px;background:var(--uc-cream);border-radius:8px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 14px;border-radius:6px;font-size:13px;font-weight:500;color:var(--uc-warm-gray);cursor:pointer;border:none;background:transparent;font-variant:small-caps;letter-spacing:0.06em}
.tab.active{background:white;color:var(--uc-black);box-shadow:var(--shadow-sm)}
[data-theme="dark"] .tab.active{background:#1c1a14}

.process-card{display:flex;flex-direction:column;gap:8px;cursor:pointer}
.process-card .process-cnj{font-family:ui-monospace,SFMono-Regular,monospace;font-size:12px;color:var(--uc-warm-gray)}
.process-card .process-name{font-family:'EB Garamond',serif;font-size:18px;font-weight:600;color:var(--uc-black);line-height:1.3}
.process-card .process-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:12px;color:var(--uc-warm-gray)}

.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:6px;top:8px;bottom:8px;width:2px;background:var(--uc-line)}
.timeline-event{position:relative;padding-bottom:16px;padding-left:8px;cursor:pointer}
.timeline-event::before{content:'';position:absolute;left:-22px;top:6px;width:12px;height:12px;background:var(--uc-gold);border-radius:50%;border:2px solid var(--uc-paper)}
.timeline-event.has-note::before{background:var(--uc-red)}

.deadline-row{display:flex;justify-content:space-between;align-items:center;padding:12px;border:1px solid var(--uc-line);border-radius:6px;background:white;gap:12px;margin-bottom:8px}
[data-theme="dark"] .deadline-row{background:#1c1a14}
.deadline-row.urgent{border-left:4px solid var(--uc-red);background:var(--uc-red-soft)}
.deadline-row.warning{border-left:4px solid var(--uc-amber);background:var(--uc-amber-soft)}
.deadline-row.safe{border-left:4px solid var(--uc-green)}
.deadline-row.expired{border-left:4px solid var(--uc-red);opacity:0.7}
.deadline-row.done{border-left:4px solid var(--uc-soft-gray);opacity:0.55;text-decoration:line-through}

.tool-card{display:flex;flex-direction:column;gap:8px;padding:16px;cursor:pointer}
.tool-icon{width:36px;height:36px;background:var(--uc-cream);border:1px solid var(--uc-line);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--uc-graphite)}
.tool-icon-gold{background:var(--uc-gold);color:white;border-color:var(--uc-gold)}
.tool-name{font-family:'EB Garamond',serif;font-size:16px;font-weight:600;color:var(--uc-black)}
.tool-desc{font-size:12px;color:var(--uc-warm-gray);line-height:1.4}

.diff-add{background:var(--uc-green-soft);color:var(--uc-green)}
.diff-del{background:var(--uc-red-soft);color:var(--uc-red);text-decoration:line-through}
.diff-line{padding:2px 8px;font-family:ui-monospace,monospace;font-size:12px;white-space:pre-wrap}

.empty-state{text-align:center;padding:48px 24px}
.empty-state-title{font-family:'EB Garamond',serif;font-size:20px;color:var(--uc-graphite);margin-bottom:8px}
.empty-state-msg{color:var(--uc-warm-gray);font-size:14px;max-width:400px;margin:0 auto 16px}

.scroll-thin::-webkit-scrollbar{width:6px;height:6px}
.scroll-thin::-webkit-scrollbar-thumb{background:var(--uc-line);border-radius:3px}
.scroll-thin::-webkit-scrollbar-track{background:transparent}

.hidden{display:none !important}
.fade-in{animation:fadeIn 0.3s ease}

.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.quick-action{background:white;border:1px solid var(--uc-line);border-radius:12px;padding:24px 16px;text-align:center;cursor:pointer;transition:all 0.15s;min-height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
[data-theme="dark"] .quick-action{background:#1c1a14}
.quick-action:hover{border-color:var(--uc-gold)}
.quick-action:active{transform:scale(0.98)}
.quick-action .qa-icon{font-size:32px}
.quick-action .qa-label{font-family:'EB Garamond',serif;font-weight:600;color:var(--uc-black);font-size:15px}

.detail-tabs{display:flex;border-bottom:1px solid var(--uc-line);margin-bottom:20px;overflow-x:auto}
.detail-tab{padding:10px 16px;border:none;background:transparent;cursor:pointer;color:var(--uc-warm-gray);font-weight:500;border-bottom:2px solid transparent;white-space:nowrap;font-size:14px;font-variant:small-caps;letter-spacing:0.06em}
.detail-tab.active{color:var(--uc-black);border-bottom-color:var(--uc-gold)}

.backup-banner{background:var(--uc-amber-soft);border:1px solid var(--uc-amber);border-radius:8px;padding:12px 16px;display:flex;gap:12px;align-items:center;margin-bottom:16px}

.note-item{background:var(--uc-cream);border:1px solid var(--uc-line);border-radius:6px;padding:12px;margin-bottom:8px}
.note-meta{font-size:11px;color:var(--uc-warm-gray);margin-bottom:4px}

.progress-wrap{margin:12px 0}
.progress-bar-bg{height:6px;background:var(--uc-cream);border-radius:3px;overflow:hidden}
.progress-bar-fg{height:100%;background:var(--uc-gold);width:0;transition:width 0.3s}

@media(min-width:769px){.show-mobile{display:none !important}}
@media(max-width:768px){.show-desktop{display:none !important}}
</style>
</head>
<body>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="logo.png" alt="Urany de Castro Advocacia">
    </div>

    <div class="nav-section">Carteira</div>
    <a class="nav-item" data-route="dashboard">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      <span>Início</span>
    </a>
    <a class="nav-item" data-route="processes">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      <span>Processos</span>
      <span id="navProcessCount" class="nav-badge gray hidden">0</span>
    </a>
    <a class="nav-item" data-route="deadlines">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <span>Prazos</span>
      <span id="navDeadlineCount" class="nav-badge hidden">0</span>
    </a>

    <div class="nav-section" style="margin-top:16px;">Operacional</div>
    <a class="nav-item" data-route="tools">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H6a1 1 0 01-1-1v-3a1 1 0 00-1-1H3a2 2 0 110-4h1a1 1 0 001-1V7a1 1 0 011-1h3a1 1 0 001-1V4z"/></svg>
      <span>Ferramentas PDF</span>
    </a>
    <a class="nav-item" data-route="diligence">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      <span>Diligência rápida</span>
    </a>

    <div class="nav-section" style="margin-top:16px;">Sistema</div>
    <a class="nav-item" data-route="settings">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      <span>Configurações</span>
    </a>

    <div style="margin-top:auto;padding:16px 20px;border-top:1px solid var(--uc-line-soft);font-size:11px;color:var(--uc-warm-gray);text-align:center;">
      <p class="smallcaps font-serif" style="margin:0 0 4px;">Urany de Castro · 30 anos</p>
      <p style="margin:0;">100% local · v4.0</p>
    </div>
  </aside>

  <main class="main-content scroll-thin">
    <div id="appContent"></div>
  </main>

</div>

// ====================================================================
// === PART 2: PERSISTENCE LAYER (IndexedDB) ==========================
// ====================================================================

const DB_NAME = 'uc-juridico';
const DB_VERSION = 2;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => { db = req.result; resolve(db); };
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('processes')) {
        const s = d.createObjectStore('processes', { keyPath: 'id' });
        s.createIndex('cnj', 'cnj', { unique: false });
        s.createIndex('updatedAt', 'updatedAt', { unique: false });
      }
      if (!d.objectStoreNames.contains('events')) {
        const s = d.createObjectStore('events', { keyPath: 'id' });
        s.createIndex('processId', 'processId', { unique: false });
      }
      if (!d.objectStoreNames.contains('deadlines')) {
        const s = d.createObjectStore('deadlines', { keyPath: 'id' });
        s.createIndex('processId', 'processId', { unique: false });
        s.createIndex('deadlineDate', 'deadlineDate', { unique: false });
        s.createIndex('status', 'status', { unique: false });
      }
      if (!d.objectStoreNames.contains('notes')) {
        const s = d.createObjectStore('notes', { keyPath: 'id' });
        s.createIndex('processId', 'processId', { unique: false });
      }
      if (!d.objectStoreNames.contains('jurisprudence')) {
        const s = d.createObjectStore('jurisprudence', { keyPath: 'id' });
        s.createIndex('processId', 'processId', { unique: false });
      }
      if (!d.objectStoreNames.contains('pdfs')) {
        d.createObjectStore('pdfs', { keyPath: 'id' });
      }
      if (!d.objectStoreNames.contains('prompts')) {
        d.createObjectStore('prompts', { keyPath: 'id' });
      }
      if (!d.objectStoreNames.contains('settings')) {
        d.createObjectStore('settings', { keyPath: 'key' });
      }
      if (!d.objectStoreNames.contains('history')) {
        const s = d.createObjectStore('history', { keyPath: 'id', autoIncrement: true });
        s.createIndex('timestamp', 'timestamp', { unique: false });
      }
      // DJEN: publications fetched (for dedup) and full data stored locally
      if (!d.objectStoreNames.contains('djen_publications')) {
        const s = d.createObjectStore('djen_publications', { keyPath: 'hash' });
        s.createIndex('cnj', 'cnj', { unique: false });
        s.createIndex('processId', 'processId', { unique: false });
        s.createIndex('dataDisponibilizacao', 'dataDisponibilizacao', { unique: false });
        s.createIndex('importedAt', 'importedAt', { unique: false });
        s.createIndex('status', 'status', { unique: false });
      }
    };
  });
}

function dbPromise(storeName, mode, fn) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, mode);
    const store = tx.objectStore(storeName);
    let result;
    try { result = fn(store); } catch(e) { reject(e); return; }
    tx.oncomplete = () => resolve(result?.result !== undefined ? result.result : result);
    tx.onerror = () => reject(tx.error);
  });
}

const DB = {
  // Processes
  async getAllProcesses() { return await dbPromise('processes', 'readonly', s => new Promise(res => { const r = s.getAll(); r.onsuccess = () => res(r.result); })); },
  async getProcess(id) { return await dbPromise('processes', 'readonly', s => new Promise(res => { const r = s.get(id); r.onsuccess = () => res(r.result); })); },
  async saveProcess(p) {
    p.updatedAt = Date.now();
    if (!p.createdAt) p.createdAt = p.updatedAt;
    await dbPromise('processes', 'readwrite', s => s.put(p));
    addHistory('process_saved', { processId: p.id, name: p.name });
    return p;
  },
  async deleteProcess(id) {
    await dbPromise('processes', 'readwrite', s => s.delete(id));
    // Cascade delete
    for (const store of ['events', 'deadlines', 'notes', 'jurisprudence']) {
      const items = await dbPromise(store, 'readonly', s => new Promise(res => { const r = s.index('processId').getAll(id); r.onsuccess = () => res(r.result); }));
      for (const item of items) await dbPromise(store, 'readwrite', s => s.delete(item.id));
    }
  },

  // Events
  async getEventsByProcess(pid) { return await dbPromise('events', 'readonly', s => new Promise(res => { const r = s.index('processId').getAll(pid); r.onsuccess = () => res(r.result); })); },
  async saveEvent(e) { await dbPromise('events', 'readwrite', s => s.put(e)); return e; },
  async deleteEvent(id) { await dbPromise('events', 'readwrite', s => s.delete(id)); },

  // Deadlines
  async getAllDeadlines() { return await dbPromise('deadlines', 'readonly', s => new Promise(res => { const r = s.getAll(); r.onsuccess = () => res(r.result); })); },
  async getDeadlinesByProcess(pid) { return await dbPromise('deadlines', 'readonly', s => new Promise(res => { const r = s.index('processId').getAll(pid); r.onsuccess = () => res(r.result); })); },
  async saveDeadline(d) { await dbPromise('deadlines', 'readwrite', s => s.put(d)); return d; },
  async deleteDeadline(id) { await dbPromise('deadlines', 'readwrite', s => s.delete(id)); },

  // Notes
  async getNotesByProcess(pid) { return await dbPromise('notes', 'readonly', s => new Promise(res => { const r = s.index('processId').getAll(pid); r.onsuccess = () => res(r.result); })); },
  async saveNote(n) { await dbPromise('notes', 'readwrite', s => s.put(n)); return n; },
  async deleteNote(id) { await dbPromise('notes', 'readwrite', s => s.delete(id)); },

  // Jurisprudence
  async getJurisprudenceByProcess(pid) { return await dbPromise('jurisprudence', 'readonly', s => new Promise(res => { const r = s.index('processId').getAll(pid); r.onsuccess = () => res(r.result); })); },
  async saveJurisprudence(j) { await dbPromise('jurisprudence', 'readwrite', s => s.put(j)); return j; },

  // PDFs (Blob storage)
  async getPdf(id) { return await dbPromise('pdfs', 'readonly', s => new Promise(res => { const r = s.get(id); r.onsuccess = () => res(r.result); })); },
  async savePdf(pdf) { await dbPromise('pdfs', 'readwrite', s => s.put(pdf)); return pdf; },
  async deletePdf(id) { await dbPromise('pdfs', 'readwrite', s => s.delete(id)); },

  // Prompts
  async getAllPrompts() { return await dbPromise('prompts', 'readonly', s => new Promise(res => { const r = s.getAll(); r.onsuccess = () => res(r.result); })); },
  async savePrompt(p) { await dbPromise('prompts', 'readwrite', s => s.put(p)); return p; },
  async deletePrompt(id) { await dbPromise('prompts', 'readwrite', s => s.delete(id)); },

  // Settings
  async getSetting(key, defaultVal = null) {
    const r = await dbPromise('settings', 'readonly', s => new Promise(res => { const r = s.get(key); r.onsuccess = () => res(r.result); }));
    return r ? r.value : defaultVal;
  },
  async setSetting(key, value) { await dbPromise('settings', 'readwrite', s => s.put({ key, value })); },

  // History
  async getHistory(limit = 50) {
    return await dbPromise('history', 'readonly', s => new Promise(res => {
      const items = []; const r = s.index('timestamp').openCursor(null, 'prev');
      r.onsuccess = (e) => { const c = e.target.result; if (c && items.length < limit) { items.push(c.value); c.continue(); } else res(items); };
    }));
  },
  async addHistoryEntry(action, data) {
    await dbPromise('history', 'readwrite', s => s.add({ timestamp: Date.now(), action, data }));
  },

  // DJEN publications
  async getAllDjenPublications() {
    return await dbPromise('djen_publications', 'readonly', s => new Promise(res => { const r = s.getAll(); r.onsuccess = () => res(r.result); }));
  },
  async getDjenPublication(hash) {
    return await dbPromise('djen_publications', 'readonly', s => new Promise(res => { const r = s.get(hash); r.onsuccess = () => res(r.result); }));
  },
  async saveDjenPublication(pub) {
    await dbPromise('djen_publications', 'readwrite', s => s.put(pub));
    return pub;
  },
  async getDjenPublicationsByProcess(processId) {
    return await dbPromise('djen_publications', 'readonly', s => new Promise(res => { const r = s.index('processId').getAll(processId); r.onsuccess = () => res(r.result); }));
  },
  async hasDjenPublication(hash) {
    const p = await this.getDjenPublication(hash);
    return !!p;
  }
};

async function addHistory(action, data) {
  try { await DB.addHistoryEntry(action, data); } catch(e) {}
}

function navigate(route, params = {}) {
  state.currentRoute = route;
  Object.assign(state, params);
  // Update nav highlighting
  document.querySelectorAll('[data-route]').forEach(el => {
    el.classList.toggle('active', el.dataset.route === (route === 'process' ? 'processes' : route));
  });
  // Update URL hash
  const hash = route === 'process' ? `#process/${params.currentProcessId}` : `#${route}`;
  if (location.hash !== hash) history.pushState(null, '', hash);
  // Render
  if (routes[route]) routes[route]();
  // Scroll to top
  window.scrollTo(0, 0);
}

function parseHash() {
  const h = location.hash.slice(1);
  if (h.startsWith('process/')) {
    return { route: 'process', currentProcessId: h.slice(8) };
  }
  return { route: h || 'dashboard' };
}

window.addEventListener('popstate', () => {
  const { route, ...params } = parseHash();
  state.currentRoute = route;
  Object.assign(state, params);
  if (routes[route]) routes[route]();
});

const $ = id => document.getElementById(id);

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function formatBytes(b) {
  if (!b) return '0 B';
  const k = 1024, sizes = ['B','KB','MB','GB'];
  const i = Math.floor(Math.log(b) / Math.log(k));
  return parseFloat((b / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

function formatDate(d, opts = {}) {
  if (!d) return '—';
  const date = d instanceof Date ? d : new Date(d);
  if (isNaN(date)) return '—';
  if (opts.relative) {
    const diff = Date.now() - date.getTime();
    const days = Math.floor(diff / 86400000);
    if (days === 0) return 'hoje';
    if (days === 1) return 'ontem';
    if (days < 7) return `há ${days} dias`;
    if (days < 30) return `há ${Math.floor(days/7)} semanas`;
    if (days < 365) return `há ${Math.floor(days/30)} meses`;
    return `há ${Math.floor(days/365)} anos`;
  }
  return date.toLocaleDateString('pt-BR');
}

function formatDateTime(d) {
  if (!d) return '—';
  const date = new Date(d);
  return date.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 9); }

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

function toast(title, msg = '', type = 'info') {
  const c = $('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.innerHTML = `<div class="toast-title">${escapeHtml(title)}</div>${msg ? `<div class="toast-msg">${escapeHtml(msg)}</div>` : ''}`;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 4000);
}

function showModal(title, fields, options = {}) {
  return new Promise(resolve => {
    const modal = document.createElement('div');
    modal.className = 'modal-backdrop';
    modal.innerHTML = `
      <div class="modal scroll-thin">
        <h3 class="modal-title">${escapeHtml(title)}</h3>
        ${options.intro ? `<p class="help-text" style="margin-bottom: 16px;">${options.intro}</p>` : ''}
        <div class="space-y-4 mb-5">
          ${fields.map((f, i) => renderModalField(f, i)).join('')}
        </div>
        <div class="flex gap-2">
          <button class="btn btn-outline" id="_modalCancel" style="flex:1">Cancelar</button>
          <button class="btn btn-primary" id="_modalConfirm" style="flex:1">${options.confirmLabel || 'Confirmar'}</button>
        </div>
      </div>`;
    $('modalContainer').appendChild(modal);
    const cleanup = () => modal.remove();
    $('_modalCancel').onclick = () => { cleanup(); resolve(null); };
    $('_modalConfirm').onclick = () => {
      const values = fields.map((f, i) => {
        const el = document.getElementById('_mf_' + i);
        return f.type === 'checkbox' ? el.checked : el.value;
      });
      cleanup(); resolve(values);
    };
    document.getElementById('_mf_0')?.focus();
  });
}

function renderModalField(f, i) {
  const id = '_mf_' + i;
  if (f.type === 'select') {
    return `<div><label class="label">${escapeHtml(f.label)}</label>${f.help ? `<p class="help-text" style="margin-bottom: 6px;">${f.help}</p>` : ''}<select class="select" id="${id}">${f.options.map(o => `<option value="${escapeHtml(o.value)}" ${o.value === f.default ? 'selected' : ''}>${escapeHtml(o.label)}</option>`).join('')}</select></div>`;
  }
  if (f.type === 'checkbox') {
    return `<div style="display: flex; gap: 8px; align-items: flex-start;"><input type="checkbox" id="${id}" ${f.default ? 'checked' : ''} style="margin-top: 3px;"><div><label for="${id}" style="font-weight: 500; cursor: pointer;">${escapeHtml(f.label)}</label>${f.help ? `<p class="help-text">${f.help}</p>` : ''}</div></div>`;
  }
  if (f.type === 'textarea') {
    return `<div><label class="label">${escapeHtml(f.label)}</label>${f.help ? `<p class="help-text" style="margin-bottom: 6px;">${f.help}</p>` : ''}<textarea class="textarea" id="${id}" rows="${f.rows || 4}">${escapeHtml(f.default || '')}</textarea></div>`;
  }
  return `<div><label class="label">${escapeHtml(f.label)}</label>${f.help ? `<p class="help-text" style="margin-bottom: 6px;">${f.help}</p>` : ''}<input type="${f.type || 'text'}" class="input" id="${id}" value="${escapeHtml(f.default || '')}" ${f.placeholder ? `placeholder="${escapeHtml(f.placeholder)}"` : ''} ${f.min !== undefined ? `min="${f.min}"` : ''} ${f.max !== undefined ? `max="${f.max}"` : ''} ${f.step !== undefined ? `step="${f.step}"` : ''}></div>`;
}

function confirmDialog(title, message, danger = false) {
  return new Promise(resolve => {
    const modal = document.createElement('div');
    modal.className = 'modal-backdrop';
    modal.innerHTML = `
      <div class="modal">
        <h3 class="modal-title">${escapeHtml(title)}</h3>
        <p style="color: var(--uc-graphite); font-size: 14px; margin-bottom: 20px;">${escapeHtml(message)}</p>
        <div class="flex gap-2">
          <button class="btn btn-outline" id="_cd_no" style="flex:1">Cancelar</button>
          <button class="btn ${danger ? 'btn-danger' : 'btn-primary'}" id="_cd_yes" style="flex:1">Confirmar</button>
        </div>
      </div>`;
    $('modalContainer').appendChild(modal);
    $('_cd_no').onclick = () => { modal.remove(); resolve(false); };
    $('_cd_yes').onclick = () => { modal.remove(); resolve(true); };
  });
}

async function renderDashboard() {
  const processes = await DB.getAllProcesses();
  const deadlines = await DB.getAllDeadlines();
  const activeDeadlines = deadlines.filter(d => d.status !== 'done');
  const today = new Date(); today.setHours(0,0,0,0);
  const urgentDeadlines = activeDeadlines.filter(d => {
    const diff = Math.ceil((new Date(d.deadlineDate) - today) / 86400000);
    return diff <= 5 && diff >= 0;
  });
  const expiredDeadlines = activeDeadlines.filter(d => new Date(d.deadlineDate) < today);

  const recentProcesses = [...processes].sort((a,b) => b.updatedAt - a.updatedAt).slice(0, 5);
  state.processes = processes;
  state.deadlines = deadlines;
  updateNavBadges();

  const lastBackup = state.settings.lastBackupAt;
  const daysSinceBackup = lastBackup ? Math.floor((Date.now() - lastBackup) / 86400000) : 999;
  const showBackupReminder = state.settings.backupReminder && processes.length > 0 && daysSinceBackup >= 7;

  $('appContent').innerHTML = `
    <div class="page-header">
      <div>
        <h1 class="page-title"><span class="smallcaps-prefix">Início</span></h1>
        <p class="page-subtitle">Visão geral da carteira · ${new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}</p>
      </div>
      <div class="flex gap-2">
        <button class="btn btn-secondary btn-sm" onclick="djenRunSearch()">🔔 Buscar DJEN</button>
        <button class="btn btn-outline btn-sm" onclick="navigate('tools')">Ferramentas PDF</button>
        <button class="btn btn-primary btn-sm" onclick="newProcessFlow()">+ Novo processo</button>
      </div>
    </div>

    ${showBackupReminder ? `
      <div class="backup-banner">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        <div style="flex:1;">
          <strong style="color: var(--uc-amber); font-size: 13px;">Backup recomendado</strong>
          <p style="font-size: 12px; margin: 2px 0 0; color: var(--uc-graphite);">Faz ${daysSinceBackup === 999 ? 'muito tempo' : daysSinceBackup + ' dias'} desde o último backup. Os dados estão apenas neste dispositivo.</p>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="exportBackup()">Fazer backup</button>
      </div>
    ` : ''}

    <div class="grid gap-4 mb-6" style="grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));">
      <div class="stat-card">
        <div class="stat-label">Processos</div>
        <div class="stat-value">${processes.length}</div>
        <div class="stat-meta">${processes.filter(p => p.status === 'active').length} ativos</div>
      </div>
      <div class="stat-card" style="${urgentDeadlines.length > 0 ? 'background: var(--uc-red-soft); border-color: var(--uc-red);' : ''}">
        <div class="stat-label">Prazos urgentes</div>
        <div class="stat-value" ${urgentDeadlines.length > 0 ? 'style="color: var(--uc-red);"' : ''}>${urgentDeadlines.length}</div>
        <div class="stat-meta">≤ 5 dias úteis</div>
      </div>
      <div class="stat-card" style="${expiredDeadlines.length > 0 ? 'background: var(--uc-amber-soft);' : ''}">
        <div class="stat-label">Vencidos</div>
        <div class="stat-value">${expiredDeadlines.length}</div>
        <div class="stat-meta">${expiredDeadlines.length > 0 ? 'Verifique' : 'Tudo em dia'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Próximos prazos</div>
        <div class="stat-value">${activeDeadlines.length}</div>
        <div class="stat-meta">No total</div>
      </div>
    </div>

    <div class="grid gap-6" style="grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));">

      <div class="card">
        <div class="flex justify-between items-center mb-4">
          <h2 class="font-serif text-lg font-semibold smallcaps" style="color: var(--uc-black);">Prazos próximos</h2>
          <a class="text-sm font-medium" style="color: var(--uc-gold); cursor: pointer;" onclick="navigate('deadlines')">Ver todos →</a>
        </div>
        ${activeDeadlines.length === 0 ? `
          <div class="empty-state" style="padding: 24px;">
            <p class="empty-state-msg">Nenhum prazo cadastrado.</p>
          </div>
        ` : activeDeadlines
            .sort((a,b) => new Date(a.deadlineDate) - new Date(b.deadlineDate))
            .slice(0, 5)
            .map(d => renderDeadlineRowMini(d, processes)).join('')}
      </div>

      <div class="card">
        <div class="flex justify-between items-center mb-4">
          <h2 class="font-serif text-lg font-semibold smallcaps" style="color: var(--uc-black);">Processos recentes</h2>
          <a class="text-sm font-medium" style="color: var(--uc-gold); cursor: pointer;" onclick="navigate('processes')">Ver todos →</a>
        </div>
        ${recentProcesses.length === 0 ? `
          <div class="empty-state" style="padding: 24px;">
            <p class="empty-state-msg">Nenhum processo cadastrado ainda.</p>
            <button class="btn btn-secondary btn-sm" onclick="newProcessFlow()">+ Cadastrar primeiro</button>
          </div>
        ` : recentProcesses.map(p => `
          <div class="process-card" style="padding: 12px; border-bottom: 1px solid var(--uc-line-soft);" onclick="navigate('process', { currentProcessId: '${p.id}' })">
            <div class="process-name">${escapeHtml(p.name)}</div>
            <div class="process-meta">
              ${p.cnj ? `<span class="process-cnj">${escapeHtml(p.cnj)}</span>` : ''}
              ${p.area ? `<span class="badge badge-gray">${escapeHtml(p.area)}</span>` : ''}
              <span style="margin-left: auto;">${formatDate(p.updatedAt, { relative: true })}</span>
            </div>
          </div>
        `).join('')}
      </div>

    </div>
  `;
}

function renderDeadlineRowMini(d, processes) {
  const proc = processes.find(p => p.id === d.processId);
  const today = new Date(); today.setHours(0,0,0,0);
  const deadlineDate = new Date(d.deadlineDate);
  const daysLeft = Math.ceil((deadlineDate - today) / 86400000);
  let cls = 'safe', label = `${daysLeft} dias`;
  if (daysLeft < 0) { cls = 'expired'; label = `vencido há ${Math.abs(daysLeft)}d`; }
  else if (daysLeft === 0) { cls = 'urgent'; label = 'HOJE'; }
  else if (daysLeft <= 3) { cls = 'urgent'; label = `${daysLeft}d`; }
  else if (daysLeft <= 7) { cls = 'warning'; label = `${daysLeft}d`; }
  return `
    <div class="deadline-row ${cls}" style="margin-bottom: 6px; padding: 10px;" onclick="navigate('process', { currentProcessId: '${d.processId}' })">
      <div style="min-width: 0; flex: 1;">
        <div style="font-weight: 500; font-size: 13px; color: var(--uc-black); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${escapeHtml(proc?.name || 'Processo')}</div>
        <div style="font-size: 11px; color: var(--uc-warm-gray);">${escapeHtml(d.description || d.type)} · ${formatDate(deadlineDate)}</div>
      </div>
      <span class="badge ${cls === 'urgent' || cls === 'expired' ? 'badge-red' : cls === 'warning' ? 'badge-amber' : 'badge-green'}">${label}</span>
    </div>
  `;
}

function updateNavBadges() {
  const pCount = state.processes.length;
  const navP = $('navProcessCount');
  if (pCount > 0) { navP.textContent = pCount; navP.classList.remove('hidden'); }

  const today = new Date(); today.setHours(0,0,0,0);
  const urgent = state.deadlines.filter(d => {
    if (d.status === 'done') return false;
    const diff = Math.ceil((new Date(d.deadlineDate) - today) / 86400000);
    return diff <= 5;
  }).length;
  const navD = $('navDeadlineCount');
  if (urgent > 0) {
    navD.textContent = urgent;
    navD.classList.remove('hidden');
    navD.classList.toggle('amber', urgent > 0);
  } else {
    navD.classList.add('hidden');
  }
}

          <div>
            <label class="label">Tribunal/Vara</label>

          </div>
          <div>
            <label class="label">Área</label>
            <select class="select" id="newProcessArea">
              <option value="Tributário" selected>Tributário</option>
              <option value="Cível">Cível</option>
              <option value="Execução Fiscal">Execução Fiscal</option>
              <option value="Recuperacional">Recuperacional</option>
              <option value="Administrativo">Administrativo</option>
              <option value="Constitucional">Constitucional</option>
              <option value="Consumidor">Consumidor</option>
              <option value="Trabalhista">Trabalhista</option>
              <option value="Família">Família</option>
              <option value="Sucessões">Sucessões</option>
              <option value="Criminal">Criminal</option>
              <option value="Outros">Outros</option>
            </select>
          </div>
          <div>
            <label class="label">Tipo de ação</label>
            <input type="text" class="input" id="newProcessType" placeholder="Ex: Execução Fiscal · Apelação Cível · MS">
          </div>
          <div>
            <label class="label">Polo</label>
            <select class="select" id="newProcessPolo">
              <option value="Defesa" selected>Defesa (executado/réu)</option>
              <option value="Ataque">Ataque (autor/exequente)</option>
            </select>
          </div>
        </div>
        <div class="flex gap-2">
          <button class="btn btn-outline" id="_npCancel" style="flex:1">Cancelar</button>
          <button class="btn btn-primary" id="_npConfirm" style="flex:1">Cadastrar</button>
        </div>
      </div>`;
    $('modalContainer').appendChild(modal);

    const cleanup = () => modal.remove();
    document.getElementById('_npCancel').onclick = () => { cleanup(); resolve(null); };
    document.getElementById('_npConfirm').onclick = async () => {
      const name = document.getElementById('newProcessName').value.trim();
      const cnj = document.getElementById('newProcessCnj').value.trim();
      const client = document.getElementById('newProcessClient').value.trim();
      const court = document.getElementById('newProcessCourt').value.trim();
      const area = document.getElementById('newProcessArea').value;
      const type = document.getElementById('newProcessType').value.trim();
      const polo = document.getElementById('newProcessPolo').value;

      if (!name) {
        toast('Nome obrigatório', 'Informe ao menos o nome do processo.', 'error');
        return;
      }

      const p = {
        id: uid(),
        name,
        cnj: cnj || null,
        client: client || null,
        court: court || null,
        area,
        type: type || null,
        polo,
        status: 'active',
        eventCount: 0,
        noteCount: 0,
        createdAt: Date.now(),
        updatedAt: Date.now()
      };

      // Se tem dados do DataJud carregados na sessão, anexa
      if (cnj && datajudCache.has(cnj.replace(/\D/g, ''))) {
        const dj = datajudCache.get(cnj.replace(/\D/g, ''));
        p.datajudLastSync = Date.now();
        p.datajudData = {
          classe: dj.classe,
          assuntos: dj.assuntos,
          valorCausa: dj.valorCausa,
          dataAjuizamento: dj.dataAjuizamento,
          sistema: dj.sistema,
          grau: dj.grau,
          formato: dj.formato,
          movimentos: dj.movimentos
        };
      }

      await DB.saveProcess(p);

      // Se tem dados do DataJud, cria eventos automaticamente das movimentações
      if (p.datajudData && p.datajudData.movimentos) {
        for (const mov of p.datajudData.movimentos.slice(0, 30)) {
          const event = {
            id: uid(),
            processId: p.id,
            eventNumber: 'DJ-' + (mov.data || ''),
            type: mov.nome,
            date: mov.data ? formatDate(mov.data) : '',
            startPage: 0, endPage: 0, pageCount: 0,
            sourceFile: 'DataJud',
            datajudCodigo: mov.codigo,
            complemento: mov.complemento,
            addedAt: Date.now()
          };
          await DB.saveEvent(event);
        }
      }

      cleanup();
      toast('Processo cadastrado', name, 'success');
      navigate('process', { currentProcessId: p.id });
      resolve(p);
    };

    document.getElementById('newProcessName').focus();
  });
}

function setProcessTab(tab) {
  state._processView.activeTab = tab;
  document.querySelectorAll('.detail-tab').forEach((el, i) => {
    el.classList.toggle('active', el.textContent.toLowerCase().includes(tab) ||
      (tab === 'overview' && i === 0));
  });
  renderProcessTabContent();
}

function renderProcessTabContent() {
  const { p, events, deadlines, notes, jurisprudence, activeTab } = state._processView;
  const c = $('processTabContent');
  if (activeTab === 'overview') c.innerHTML = renderProcessOverview(p, events, deadlines, notes, jurisprudence);
  else if (activeTab === 'events') c.innerHTML = renderProcessEvents(p, events, notes);
  else if (activeTab === 'deadlines') c.innerHTML = renderProcessDeadlines(p, deadlines);
  else if (activeTab === 'jurisprudence') c.innerHTML = renderProcessJurisprudence(p, jurisprudence);
  else if (activeTab === 'notes') c.innerHTML = renderProcessNotes(p, notes);
  else if (activeTab === 'analysis') c.innerHTML = renderProcessAnalysis(p, events, deadlines, jurisprudence);
}

      </div>
    </div>
    ` : ''}
    `}

    <div class="card">

        <button class="btn btn-outline" onclick="addDeadlineFlow()">⏰ Adicionar prazo</button>
        <button class="btn btn-outline" onclick="copyProcessToClaude()">📋 Copiar contexto p/ Claude</button>
        <button class="btn btn-outline" onclick="generateProcessFiche()">📜 Gerar ficha (Word)</button>

function renderProcessEvents(p, events, notes) {
  if (events.length === 0) {
    return `
      <div class="empty-state">
        <h3 class="empty-state-title">Nenhum evento indexado</h3>
        <p class="empty-state-msg">Importe um PDF do auto pela aba Ferramentas PDF e indexe-o. Os eventos detectados serão vinculados a este processo.</p>
        <button class="btn btn-primary" onclick="importPdfToProcess()">📄 Importar PDF do auto</button>
      </div>
    `;
  }
  const sorted = [...events].sort((a,b) => parseInt(a.eventNumber) - parseInt(b.eventNumber));
  return `
    <div class="flex justify-between items-center mb-3">
      <p class="text-sm" style="color: var(--uc-warm-gray);">${events.length} evento(s) · clique em um evento para ver detalhes ou adicionar nota</p>
      <button class="btn btn-outline btn-sm" onclick="importPdfToProcess()">+ Importar mais peças</button>
    </div>
    <div class="timeline">
      ${sorted.map(e => {
        const evNotes = notes.filter(n => n.eventId === e.id);
        return `
          <div class="timeline-event ${evNotes.length > 0 ? 'has-note' : ''}" onclick="openEventDetail('${e.id}')">
            <div style="font-family: 'EB Garamond', serif; font-weight: 600; color: var(--uc-black); font-size: 16px;">
              Evento ${escapeHtml(e.eventNumber)} · ${escapeHtml(e.type)}
            </div>
            <div style="font-size: 12px; color: var(--uc-warm-gray); margin-top: 2px;">
              ${e.date ? escapeHtml(e.date) + ' · ' : ''}pgs ${e.startPage}–${e.endPage} (${e.pageCount} pgs)
              ${evNotes.length > 0 ? ` · 📝 ${evNotes.length} nota(s)` : ''}
            </div>
          </div>

}

function renderProcessDeadlines(p, deadlines) {
  const active = deadlines.filter(d => d.status !== 'done');
  const done = deadlines.filter(d => d.status === 'done');
  return `
    <div class="flex justify-between items-center mb-3">
      <p class="text-sm" style="color: var(--uc-warm-gray);">${active.length} ativo(s) · ${done.length} concluído(s)</p>
      <button class="btn btn-primary btn-sm" onclick="addDeadlineFlow()">+ Adicionar prazo</button>
    </div>
    ${deadlines.length === 0 ? `
      <div class="empty-state">
        <p class="empty-state-msg">Nenhum prazo cadastrado para este processo.</p>
      </div>
    ` : ''}
    ${active.sort((a,b) => new Date(a.deadlineDate) - new Date(b.deadlineDate)).map(d => renderDeadlineRow(d, p)).join('')}
    ${done.length > 0 ? `<h4 class="smallcaps text-xs mt-6 mb-2" style="color: var(--uc-warm-gray);">Concluídos</h4>` : ''}
    ${done.sort((a,b) => b.completedAt - a.completedAt).map(d => renderDeadlineRow(d, p)).join('')}
  `;
}

function renderDeadlineRow(d, p) {
  const today = new Date(); today.setHours(0,0,0,0);
  const dl = new Date(d.deadlineDate);
  const days = Math.ceil((dl - today) / 86400000);
  let cls = 'safe', label = `${days}d`;
  if (d.status === 'done') { cls = 'done'; label = '✓ feito'; }
  else if (days < 0) { cls = 'expired'; label = `vencido ${Math.abs(days)}d atrás`; }
  else if (days === 0) { cls = 'urgent'; label = 'HOJE'; }
  else if (days <= 3) { cls = 'urgent'; label = `${days}d`; }
  else if (days <= 7) { cls = 'warning'; label = `${days}d`; }
  return `
    <div class="deadline-row ${cls}">
      <div style="flex: 1; min-width: 0;">
        <div style="font-weight: 600; color: var(--uc-black);">${escapeHtml(d.description || d.type)}</div>
        <div style="font-size: 12px; color: var(--uc-warm-gray); margin-top: 2px;">
          Vence ${formatDate(dl)}${d.intimationDate ? ' · intimação ' + formatDate(d.intimationDate) : ''}${d.daysAllowed ? ' · ' + d.daysAllowed + ' dias úteis' : ''}
        </div>
      </div>
      <div class="flex gap-2 items-center">
        <span class="badge ${cls === 'urgent' || cls === 'expired' ? 'badge-red' : cls === 'warning' ? 'badge-amber' : cls === 'done' ? 'badge-gray' : 'badge-green'}">${label}</span>
        ${d.status !== 'done' ? `<button class="btn btn-ghost btn-sm" onclick="markDeadlineDone('${d.id}')" title="Marcar como concluído">✓</button>` : ''}
        <button class="btn btn-ghost btn-sm" onclick="deleteDeadline('${d.id}')" title="Remover">🗑</button>
      </div>
    </div>
  `;
}

function renderProcessJurisprudence(p, jurisprudence) {
  if (jurisprudence.length === 0) {
    return `
      <div class="empty-state">
        <h3 class="empty-state-title">Nenhuma jurisprudência catalogada</h3>
        <p class="empty-state-msg">Use a ferramenta "Extrair Jurisprudência" no menu PDF apontando para um auto deste processo. As citações detectadas serão vinculadas aqui automaticamente.</p>
      </div>
    `;
  }
  // Group by type
  const byType = {};
  jurisprudence.forEach(j => { if (!byType[j.type]) byType[j.type] = []; byType[j.type].push(j); });
  return `
    <p class="text-sm mb-3" style="color: var(--uc-warm-gray);">${jurisprudence.length} citação(ões) catalogada(s)</p>
    ${Object.entries(byType).map(([type, items]) => `
      <div class="card mb-3">
        <h4 class="font-serif font-semibold smallcaps mb-2" style="color: var(--uc-black);">${escapeHtml(type)} · ${items.length}</h4>
        <div class="flex flex-wrap gap-2">
          ${items.map(i => `<span class="badge badge-gold">${escapeHtml(i.citation)}</span>`).join('')}
        </div>
      </div>
    `).join('')}
  `;
}

function renderProcessNotes(p, notes) {
  return `
    <div class="flex justify-between items-center mb-3">
      <p class="text-sm" style="color: var(--uc-warm-gray);">${notes.length} nota(s)</p>
      <button class="btn btn-primary btn-sm" onclick="addNoteFlow()">+ Nova nota</button>
    </div>
    ${notes.length === 0 ? `

function renderProcessAnalysis(p, events, deadlines, jurisprudence) {

async function editProcessFlow() {
  const p = state._processView.p;
  const r = await showModal('Editar processo', [
    { label: 'Nome', default: p.name },
    { label: 'CNJ', default: p.cnj || '' },
    { label: 'Cliente', default: p.client || '' },
    { label: 'Tribunal', default: p.court || '' },
    { label: 'Tipo', default: p.type || '' },
    { label: 'Área', type: 'select', default: p.area || 'Tributário', options: [
      { value: 'Tributário', label: 'Tributário' }, { value: 'Cível', label: 'Cível' },
      { value: 'Execução Fiscal', label: 'Execução Fiscal' }, { value: 'Recuperação Judicial', label: 'Recuperação Judicial' },
      { value: 'Administrativo', label: 'Administrativo' }, { value: 'Consumidor', label: 'Consumidor' },
      { value: 'Outros', label: 'Outros' }
    ]},
    { label: 'Polo', type: 'select', default: p.polo || 'Defesa', options: [
      { value: 'Defesa', label: 'Defesa' }, { value: 'Ataque', label: 'Ataque' }
    ]}
  ], { confirmLabel: 'Salvar' });
  if (!r) return;
  const [name, cnj, client, court, type, area, polo] = r;
  Object.assign(p, { name, cnj: cnj || null, client: client || null, court: court || null, type: type || null, area, polo });
  await DB.saveProcess(p);
  toast('Processo atualizado', '', 'success');
  renderProcessDetail();
}

async function archiveProcessFlow() {
  const p = state._processView.p;
  const ok = await confirmDialog(p.status === 'archived' ? 'Reativar processo?' : 'Arquivar processo?',
    p.status === 'archived' ? 'O processo voltará para a lista ativa.' : 'O processo continuará acessível mas marcado como arquivado.');
  if (!ok) return;
  p.status = p.status === 'archived' ? 'active' : 'archived';
  await DB.saveProcess(p);
  toast(p.status === 'archived' ? 'Arquivado' : 'Reativado', '', 'success');
  renderProcessDetail();
}

async function addNoteFlow(eventId = null) {
  const r = await showModal(eventId ? 'Adicionar nota ao evento' : 'Nova nota', [
    { label: 'Texto da nota', type: 'textarea', rows: 6, placeholder: 'Observação, lembrete, estratégia...' }
  ], { confirmLabel: 'Salvar' });
  if (!r || !r[0]?.trim()) return;
  const note = { id: uid(), processId: state.currentProcessId, eventId, text: r[0].trim(), createdAt: Date.now() };
  await DB.saveNote(note);
  toast('Nota adicionada', '', 'success');
  renderProcessDetail();
}

async function editNote(id) {
  const n = state._processView.notes.find(n => n.id === id);
  if (!n) return;
  const r = await showModal('Editar nota', [
    { label: 'Texto', type: 'textarea', rows: 6, default: n.text }
  ], { confirmLabel: 'Salvar' });
  if (!r) return;
  n.text = r[0].trim();
  n.updatedAt = Date.now();
  await DB.saveNote(n);
  renderProcessDetail();
}

async function deleteNote(id) {
  const ok = await confirmDialog('Remover nota?', 'Esta ação não pode ser desfeita.', true);
  if (!ok) return;
  await DB.deleteNote(id);
  renderProcessDetail();
}

async function addDeadlineFlow() {
  const r = await showModal('Adicionar prazo', [
    { label: 'Descrição', placeholder: 'Ex: Embargos à execução · Resposta · Recurso' },
    { label: 'Data da intimação/publicação (opcional)', type: 'date' },
    { label: 'Prazo em dias úteis', type: 'number', default: '15', min: '1', max: '365' },
    { label: 'OU data de vencimento direta (se preferir)', type: 'date' }
  ], { confirmLabel: 'Adicionar', intro: 'Informe a data da intimação + dias OU diretamente a data de vencimento.' });
  if (!r) return;
  const [desc, intDate, days, directDate] = r;
  if (!desc?.trim()) { toast('Descrição obrigatória', '', 'error'); return; }
  let deadlineDate;
  if (directDate) {
    deadlineDate = new Date(directDate + 'T12:00:00');
  } else if (intDate && days) {
    deadlineDate = addBusinessDays(new Date(intDate + 'T12:00:00'), parseInt(days));
  } else {
    toast('Informe pelo menos a data de vencimento', '', 'error'); return;
  }
  const d = {
    id: uid(), processId: state.currentProcessId,
    description: desc.trim(),
    type: 'manual',
    intimationDate: intDate ? new Date(intDate + 'T12:00:00').toISOString() : null,
    daysAllowed: days ? parseInt(days) : null,
    deadlineDate: deadlineDate.toISOString(),
    status: 'pending',
    createdAt: Date.now()
  };
  await DB.saveDeadline(d);
  toast('Prazo adicionado', formatDate(deadlineDate), 'success');
  renderProcessDetail();
}

async function markDeadlineDone(id) {
  const d = state._processView.deadlines.find(x => x.id === id);
  if (!d) return;
  d.status = 'done';
  d.completedAt = Date.now();
  await DB.saveDeadline(d);
  toast('Prazo concluído', '', 'success');
  renderProcessDetail();
}

async function deleteDeadline(id) {
  const ok = await confirmDialog('Remover prazo?', '', true);
  if (!ok) return;
  await DB.deleteDeadline(id);
  renderProcessDetail();
}

async function openEventDetail(eventId) {
  const e = state._processView.events.find(x => x.id === eventId);
  if (!e) return;
  const evNotes = state._processView.notes.filter(n => n.eventId === eventId);
  const modal = document.createElement('div');
  modal.className = 'modal-backdrop';
  modal.innerHTML = `
    <div class="modal scroll-thin" style="max-width: 600px;">
      <h3 class="modal-title">Evento ${escapeHtml(e.eventNumber)}</h3>
      <div style="margin-bottom: 16px; font-size: 14px;">
        <p><strong>Tipo:</strong> ${escapeHtml(e.type)}</p>
        ${e.date ? `<p><strong>Data:</strong> ${escapeHtml(e.date)}</p>` : ''}
        <p><strong>Páginas:</strong> ${e.startPage}–${e.endPage} (${e.pageCount} pgs)</p>
      </div>
      <h4 class="font-serif font-semibold smallcaps mb-2" style="color: var(--uc-black);">Notas vinculadas</h4>

      <div class="flex gap-2 mt-4">
        <button class="btn btn-outline" onclick="(function(){document.querySelector('.modal-backdrop').remove(); addNoteFlow('${eventId}');})()" style="flex:1">+ Nota neste evento</button>
        <button class="btn btn-primary" onclick="document.querySelector('.modal-backdrop').remove()" style="flex:1">Fechar</button>

function buildProcessClaudePackage(p, events, deadlines, notes, jurisprudence, promptTemplate) {
  let md = `# Pacote de análise · ${p.name}\n\n`;
  md += `**Gerado em:** ${formatDateTime(Date.now())}\n\n`;
  md += `---\n\n## Identificação do processo\n\n`;
  if (p.cnj) md += `- **CNJ:** ${p.cnj}\n`;
  if (p.client) md += `- **Cliente:** ${p.client}\n`;
  if (p.court) md += `- **Tribunal:** ${p.court}\n`;
  if (p.type) md += `- **Tipo:** ${p.type}\n`;
  if (p.area) md += `- **Área:** ${p.area}\n`;
  if (p.polo) md += `- **Polo:** ${p.polo}\n`;

  if (events.length > 0) {
    md += `\n---\n\n## Cronologia (${events.length} eventos)\n\n`;
    md += `| Evento | Data | Tipo | Pgs |\n|---|---|---|---|\n`;
    [...events].sort((a,b) => parseInt(a.eventNumber) - parseInt(b.eventNumber)).forEach(e => {
      md += `| ${e.eventNumber} | ${e.date || '—'} | ${e.type.replace(/\|/g,'/')} | ${e.startPage}–${e.endPage} |\n`;
    });
  }

  if (deadlines.filter(d => d.status !== 'done').length > 0) {
    md += `\n---\n\n## Prazos ativos\n\n`;
    deadlines.filter(d => d.status !== 'done').sort((a,b) => new Date(a.deadlineDate) - new Date(b.deadlineDate)).forEach(d => {
      const dl = new Date(d.deadlineDate);
      const today = new Date(); today.setHours(0,0,0,0);
      const days = Math.ceil((dl - today) / 86400000);
      md += `- **${d.description || d.type}** · vence ${formatDate(dl)} (${days >= 0 ? days + ' dias úteis' : 'VENCIDO há ' + Math.abs(days) + ' dias'})\n`;
    });
  }

  if (jurisprudence.length > 0) {
    md += `\n---\n\n## Jurisprudência catalogada\n\n`;
    const byType = {};
    jurisprudence.forEach(j => { if (!byType[j.type]) byType[j.type] = []; byType[j.type].push(j.citation); });
    for (const [t, items] of Object.entries(byType)) {
      md += `### ${t} (${items.length})\n`;
      items.forEach(i => md += `- ${i}\n`);
      md += '\n';
    }
  }

  if (notes.length > 0) {
    md += `\n---\n\n## Notas e observações\n\n`;
    notes.sort((a,b) => a.createdAt - b.createdAt).forEach(n => {
      md += `**${formatDateTime(n.createdAt)}**${n.eventId ? ` (evento ${events.find(e => e.id === n.eventId)?.eventNumber || '?'})` : ''}\n${n.text}\n\n`;
    });
  }

  // Prompt
  md += `\n---\n\n## Prompt para análise\n\n\`\`\`\n`;
  md += promptTemplate ? promptTemplate.replace(/\[NÚMERO\]/g, p.cnj || '[NÚMERO]')
    .replace(/\[ÁREA DO DIREITO\]/g, p.area || 'Direito Tributário')
    .replace(/\[TRIBUNAL\]/g, p.court || '[TRIBUNAL]')
    .replace(/\[TIPO\]/g, p.type || '[TIPO]')
    .replace(/\[NOME E POLO\]/g, p.client && p.polo ? `${p.client} (${p.polo})` : '[NOME E POLO]')
    : DEFAULT_PROMPT_TEMPLATE.replace(/\[NÚMERO\]/g, p.cnj || '[NÚMERO]').replace(/\[ÁREA DO DIREITO\]/g, p.area || 'Direito Tributário');
  md += `\n\`\`\`\n`;
  return md;
}

async function copyProcessToClaude() {
  const { p, events, deadlines, notes, jurisprudence } = state._processView;
  const prompts = await DB.getAllPrompts();
  const defaultId = await DB.getSetting('defaultPromptId');
  const prompt = prompts.find(pr => pr.id === defaultId) || prompts[0];
  const md = buildProcessClaudePackage(p, events, deadlines, notes, jurisprudence, prompt?.content);
  try {
    await navigator.clipboard.writeText(md);
    toast('Copiado!', 'Cole no Claude para iniciar a análise.', 'success');
  } catch(e) {
    // Fallback: download
    downloadBlob(new Blob([md], { type: 'text/markdown;charset=utf-8' }), `${p.name.replace(/[^\w]/g, '_')}_pacote_claude.md`);
    toast('Baixado', 'Não foi possível copiar — arquivo baixado.', 'info');
  }
}

async function downloadProcessPackage() {
  const { p, events, deadlines, notes, jurisprudence } = state._processView;
  const prompts = await DB.getAllPrompts();
  const defaultId = await DB.getSetting('defaultPromptId');
  const prompt = prompts.find(pr => pr.id === defaultId) || prompts[0];
  const md = buildProcessClaudePackage(p, events, deadlines, notes, jurisprudence, prompt?.content);
  downloadBlob(new Blob([md], { type: 'text/markdown;charset=utf-8' }), `${p.name.replace(/[^\w]/g, '_')}_pacote_claude.md`);
  toast('Baixado', '', 'success');
}

async function renderDeadlines() {
  const deadlines = await DB.getAllDeadlines();
  const processes = await DB.getAllProcesses();
  state.deadlines = deadlines;
  state.processes = processes;
  updateNavBadges();

  const today = new Date(); today.setHours(0,0,0,0);
  const enriched = deadlines.map(d => {
    const proc = processes.find(p => p.id === d.processId);
    const dl = new Date(d.deadlineDate);
    const days = Math.ceil((dl - today) / 86400000);
    return { ...d, processName: proc?.name || 'Processo removido', processCnj: proc?.cnj, days };
  });
  const active = enriched.filter(d => d.status !== 'done');
  const done = enriched.filter(d => d.status === 'done');
  const expired = active.filter(d => d.days < 0);
  const urgent = active.filter(d => d.days >= 0 && d.days <= 5);
  const warning = active.filter(d => d.days > 5 && d.days <= 14);
  const safe = active.filter(d => d.days > 14);

  $('appContent').innerHTML = `
    <div class="page-header">
      <div>
        <h1 class="page-title"><span class="smallcaps-prefix">Agenda</span></h1>
        <p class="page-subtitle">${active.length} prazo(s) ativo(s) na carteira</p>
      </div>
      <div class="flex gap-2">
        <button class="btn btn-outline btn-sm" onclick="exportDeadlinesCsv()">Exportar CSV</button>
      </div>
    </div>

    <div class="grid gap-3 mb-6" style="grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));">
      <div class="stat-card" style="${expired.length > 0 ? 'background: var(--uc-red-soft); border-color: var(--uc-red);' : ''}">
        <div class="stat-label">Vencidos</div>
        <div class="stat-value" style="${expired.length > 0 ? 'color: var(--uc-red);' : ''}">${expired.length}</div>
      </div>
      <div class="stat-card" style="${urgent.length > 0 ? 'background: var(--uc-red-soft);' : ''}">
        <div class="stat-label">Urgentes</div>
        <div class="stat-value">${urgent.length}</div>
        <div class="stat-meta">≤ 5 dias</div>
      </div>
      <div class="stat-card" style="${warning.length > 0 ? 'background: var(--uc-amber-soft);' : ''}">
        <div class="stat-label">Atenção</div>
        <div class="stat-value">${warning.length}</div>
        <div class="stat-meta">6-14 dias</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Tranquilos</div>
        <div class="stat-value">${safe.length}</div>
        <div class="stat-meta">+14 dias</div>
      </div>
    </div>

    ${active.length === 0 ? `
      <div class="card empty-state">
        <h3 class="empty-state-title">Nenhum prazo ativo</h3>
        <p class="empty-state-msg">Você não tem prazos pendentes. Adicione prazos a partir de cada processo na aba "Prazos".</p>
      </div>
    ` : `
      ${expired.length > 0 ? `<h3 class="font-serif text-lg font-semibold smallcaps mb-3" style="color: var(--uc-red);">⚠ Vencidos · ${expired.length}</h3>${expired.sort((a,b) => a.days - b.days).map(d => renderGlobalDeadlineRow(d)).join('')}` : ''}
      ${urgent.length > 0 ? `<h3 class="font-serif text-lg font-semibold smallcaps mt-6 mb-3" style="color: var(--uc-red);">Urgentes · ${urgent.length}</h3>${urgent.sort((a,b) => a.days - b.days).map(d => renderGlobalDeadlineRow(d)).join('')}` : ''}
      ${warning.length > 0 ? `<h3 class="font-serif text-lg font-semibold smallcaps mt-6 mb-3" style="color: var(--uc-amber);">Atenção · ${warning.length}</h3>${warning.sort((a,b) => a.days - b.days).map(d => renderGlobalDeadlineRow(d)).join('')}` : ''}
      ${safe.length > 0 ? `<h3 class="font-serif text-lg font-semibold smallcaps mt-6 mb-3" style="color: var(--uc-green);">Próximos · ${safe.length}</h3>${safe.sort((a,b) => a.days - b.days).map(d => renderGlobalDeadlineRow(d)).join('')}` : ''}
    `}
  `;
}

function renderGlobalDeadlineRow(d) {
  let cls = 'safe', label = `${d.days}d`;
  if (d.days < 0) { cls = 'expired'; label = `há ${Math.abs(d.days)}d`; }
  else if (d.days === 0) { cls = 'urgent'; label = 'HOJE'; }
  else if (d.days <= 3) { cls = 'urgent'; label = `${d.days}d`; }
  else if (d.days <= 7) { cls = 'warning'; label = `${d.days}d`; }
  return `
    <div class="deadline-row ${cls}" onclick="navigate('process', { currentProcessId: '${d.processId}' })">
      <div style="flex: 1; min-width: 0;">
        <div style="font-weight: 600; color: var(--uc-black);">${escapeHtml(d.description || d.type)}</div>
        <div style="font-size: 12px; color: var(--uc-warm-gray); margin-top: 2px;">
          ${escapeHtml(d.processName)}${d.processCnj ? ` · ${d.processCnj}` : ''} · vence ${formatDate(d.deadlineDate)}
        </div>
      </div>
      <span class="badge ${cls === 'urgent' || cls === 'expired' ? 'badge-red' : cls === 'warning' ? 'badge-amber' : 'badge-green'}">${label}</span>
    </div>
  `;
}

async function exportDeadlinesCsv() {
  const deadlines = await DB.getAllDeadlines();
  const processes = await DB.getAllProcesses();
  const today = new Date(); today.setHours(0,0,0,0);
  let csv = 'Processo,CNJ,Prazo,Vencimento,Dias restantes,Status\n';
  deadlines.forEach(d => {
    const p = processes.find(x => x.id === d.processId);
    const dl = new Date(d.deadlineDate);
    const days = Math.ceil((dl - today) / 86400000);
    csv += `"${(p?.name || '').replace(/"/g,'""')}","${p?.cnj || ''}","${(d.description || d.type).replace(/"/g,'""')}","${formatDate(dl)}","${d.status === 'done' ? 'concluído' : days}","${d.status === 'done' ? 'concluído' : days < 0 ? 'vencido' : 'pendente'}"\n`;
  });
  downloadBlob(new Blob([csv], { type: 'text/csv;charset=utf-8' }), `prazos_${new Date().toISOString().slice(0,10)}.csv`);
  toast('Exportado', '', 'success');
}

let tesseractWorker = null, tesseractWorkerLang = null;

// ============== TESSERACT WORKER MGMT ==============
async function getTesseractWorker(lang) {
  if (tesseractWorker && tesseractWorkerLang === lang) return tesseractWorker;
  if (tesseractWorker) { try { await tesseractWorker.terminate(); } catch(e) {} tesseractWorker = null; }
  tesseractWorker = await Tesseract.createWorker(lang, 1);
  tesseractWorkerLang = lang;
  return tesseractWorker;
}

async function processCompressAggressive(pdfBytes, dpi = 150, quality = 0.7, progressCb = null) {
  const pdfDoc = await pdfjsLib.getDocument({ data: pdfBytes.slice(0) }).promise;
  const newPdf = await PDFDocument.create();
  const scale = dpi / 72;
  for (let i = 1; i <= pdfDoc.numPages; i++) {
    if (progressCb) progressCb(i, pdfDoc.numPages);
    const page = await pdfDoc.getPage(i);
    const viewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width; canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'white'; ctx.fillRect(0,0,canvas.width,canvas.height);
    await page.render({ canvasContext: ctx, viewport }).promise;
    const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', quality));
    const jpegBytes = await blob.arrayBuffer();
    const jpegImage = await newPdf.embedJpg(jpegBytes);
    const newPage = newPdf.addPage([jpegImage.width, jpegImage.height]);
    newPage.drawImage(jpegImage, { x: 0, y: 0, width: jpegImage.width, height: jpegImage.height });
  }
  return await newPdf.save({ useObjectStreams: true });
}

async function processCompressLight(pdfBytes) {
  const pdfLib = await PDFDocument.load(pdfBytes.slice(0), { ignoreEncryption: true });
  return await pdfLib.save({ useObjectStreams: true });
}

async function processExtractText(pdfBytes, progressCb = null) {
  const pdfDoc = await pdfjsLib.getDocument({ data: pdfBytes.slice(0) }).promise;
  let fullText = '';
  for (let i = 1; i <= pdfDoc.numPages; i++) {
    if (progressCb) progressCb(i, pdfDoc.numPages);
    const page = await pdfDoc.getPage(i);
    const tc = await page.getTextContent();
    let lastY = null, pageText = '';
    for (const item of tc.items) {
      if (lastY !== null && Math.abs(item.transform[5] - lastY) > 2) pageText += '\n';
      pageText += item.str + ' ';
      lastY = item.transform[5];
    }
    fullText += `\n\n========== PÁGINA ${i} ==========\n\n${pageText.trim()}\n`;
  }
  return fullText;
}

async function processOcr(pdfBytes, lang = 'por', dpi = 200, progressCb = null) {
  const pdfDoc = await pdfjsLib.getDocument({ data: pdfBytes.slice(0) }).promise;
  const worker = await getTesseractWorker(lang);
  const scale = dpi / 72;
  let fullText = '';
  for (let i = 1; i <= pdfDoc.numPages; i++) {
    if (progressCb) progressCb(i, pdfDoc.numPages, 'OCR');
    const page = await pdfDoc.getPage(i);
    const viewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width; canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'white'; ctx.fillRect(0,0,canvas.width,canvas.height);
    await page.render({ canvasContext: ctx, viewport }).promise;
    const { data } = await worker.recognize(canvas);
    fullText += `\n\n========== PÁGINA ${i} ==========\n\n${data.text.trim()}\n`;
    canvas.width = 0; canvas.height = 0;
  }
  return fullText;
}

async function processOcrSelective(pdfBytes, lang = 'por', dpi = 200, progressCb = null) {
  const pdfDoc = await pdfjsLib.getDocument({ data: pdfBytes.slice(0) }).promise;
  let worker = null;
  let fullText = '';
  let nativeCount = 0, ocrCount = 0;
  for (let i = 1; i <= pdfDoc.numPages; i++) {
    if (progressCb) progressCb(i, pdfDoc.numPages);
    const page = await pdfDoc.getPage(i);
    const tc = await page.getTextContent();
    const nativeText = tc.items.map(it => it.str).join(' ').trim();
    if (nativeText.length > 100) {
      // page has reliable native text
      let pageText = '', lastY = null;
      for (const item of tc.items) {
        if (lastY !== null && Math.abs(item.transform[5] - lastY) > 2) pageText += '\n';
        pageText += item.str + ' ';
        lastY = item.transform[5];
      }
      fullText += `\n\n========== PÁGINA ${i} (nativo) ==========\n\n${pageText.trim()}\n`;
      nativeCount++;
    } else {
      // OCR
      if (!worker) worker = await getTesseractWorker(lang);
      const viewport = page.getViewport({ scale: dpi/72 });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width; canvas.height = viewport.height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = 'white'; ctx.fillRect(0,0,canvas.width,canvas.height);
      await page.render({ canvasContext: ctx, viewport }).promise;
      const { data } = await worker.recognize(canvas);
      fullText += `\n\n========== PÁGINA ${i} (OCR) ==========\n\n${data.text.trim()}\n`;
      canvas.width = 0; canvas.height = 0;
      ocrCount++;
    }
  }
  return { text: fullText, nativeCount, ocrCount };
}

async function processSearchablePdf(pdfBytes, lang = 'por', dpi = 200, quality = 0.85, progressCb = null) {
  const pdfDoc = await pdfjsLib.getDocument({ data: pdfBytes.slice(0) }).promise;
  const worker = await getTesseractWorker(lang);
  const newPdf = await PDFDocument.create();
  const helvFont = await newPdf.embedFont(StandardFonts.Helvetica);
  const scale = dpi / 72;
  let totalWords = 0;
  for (let i = 1; i <= pdfDoc.numPages; i++) {
    if (progressCb) progressCb(i, pdfDoc.numPages);
    const page = await pdfDoc.getPage(i);
    const viewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width; canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'white'; ctx.fillRect(0,0,canvas.width,canvas.height);
    await page.render({ canvasContext: ctx, viewport }).promise;
    const { data } = await worker.recognize(canvas);
    const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', quality));
    const jpegBytes = await blob.arrayBuffer();
    const jpegImage = await newPdf.embedJpg(jpegBytes);
    const newPage = newPdf.addPage([jpegImage.width, jpegImage.height]);
    newPage.drawImage(jpegImage, { x: 0, y: 0, width: jpegImage.width, height: jpegImage.height });

    // Embed invisible text layer at word positions
    if (data.words) {
      for (const word of data.words) {
        if (!word.text || !word.bbox) continue;
        const txt = word.text.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^\x20-\x7E]/g, '');
        if (!txt.trim()) continue;
        const { x0, y0, x1, y1 } = word.bbox;
        const h = y1 - y0;
        const pdfY = jpegImage.height - y1;
        try {
          newPage.drawText(txt, {
            x: x0, y: pdfY,
            size: Math.max(2, h * 0.7),
            font: helvFont,
            opacity: 0.001,
            color: rgb(1,1,1)
          });
          totalWords++;
        } catch(e) {}
      }
    }
    canvas.width = 0; canvas.height = 0;
  }
  return { bytes: await newPdf.save({ useObjectStreams: true }), totalWords };
}

async function processSplit(pdfBytes, fileName, chunkSize, progressCb = null) {
  const pdfLib = await PDFDocument.load(pdfBytes.slice(0), { ignoreEncryption: true });
  const totalPages = pdfLib.getPageCount();
  const numChunks = Math.ceil(totalPages / chunkSize);
  const baseName = fileName.replace(/\.pdf$/i, '');
  const parts = [];
  for (let c = 0; c < numChunks; c++) {
    if (progressCb) progressCb(c + 1, numChunks);
    const start = c * chunkSize;
    const end = Math.min(start + chunkSize, totalPages);
    const newPdf = await PDFDocument.create();
    const idx = Array.from({length: end - start}, (_, i) => start + i);
    const pages = await newPdf.copyPages(pdfLib, idx);
    pages.forEach(p => newPdf.addPage(p));
    parts.push({ name: `${baseName}_parte${String(c+1).padStart(2,'0')}_pgs${start+1}-${end}.pdf`, bytes: await newPdf.save() });
  }
  return parts;
}
