// ============== LEGAL PROCESSING ==============

// Detect event headers in PJe/eSAJ/PROJUDI documents
async function processIndexAutos(pdfBytes, progressCb = null) {
  const pdfDoc = await pdfjsLib.getDocument({ data: pdfBytes.slice(0) }).promise;
  const numPages = pdfDoc.numPages;
  const events = [];
  const allPagesText = [];

  // Patterns ordered by specificity
  const patterns = [
    // PJe TRF/TJ classic: "Evento N - Tipo - DD/MM/AAAA"
    { re: /Evento\s+(\d+)[\s\-–·]+([^\n\-–]{3,80}?)[\s\-–·]+(\d{2}\/\d{2}\/\d{4})/i, fmt: m => ({ num: m[1], type: m[2].trim(), date: m[3] }) },
    // PJe alt: "Evento N - Tipo"
    { re: /Evento\s+(\d+)[\s\-–·]+([A-ZÁÉÍÓÚÂÊÔÃÕÇ][^\n]{3,80})/i, fmt: m => ({ num: m[1], type: m[2].trim(), date: '' }) },
    // eSAJ: "fls. NNNN" with peça name nearby
    { re: /(?:Pe[çc]a|Documento)\s+(\d+)[\s\-–:]+([^\n]{3,80})/i, fmt: m => ({ num: m[1], type: m[2].trim(), date: '' }) },
    // Sequencial
    { re: /Sequencial\s+(\d+)[\s\-–:]+([^\n]{3,80})/i, fmt: m => ({ num: m[1], type: m[2].trim(), date: '' }) },
  ];

  // Also detect process number (CNJ format)
  const processRe = /(\d{7}-\d{2}\.\d{4}\.\d\.\d{2}\.\d{4})/;
  let detectedProcessNumber = null;

  for (let i = 1; i <= numPages; i++) {
    if (progressCb) progressCb(i, numPages);
    const page = await pdfDoc.getPage(i);
    const tc = await page.getTextContent();
    const pageText = tc.items.map(it => it.str).join(' ');
    allPagesText.push(pageText);

    if (!detectedProcessNumber) {
      const pm = pageText.match(processRe);
      if (pm) detectedProcessNumber = pm[1];
    }

    // Check first 400 chars for header
    const headerSample = pageText.substring(0, 500);
    for (const p of patterns) {
      const m = headerSample.match(p.re);
      if (m) {
        const data = p.fmt(m);
        // Avoid duplicate consecutive events
        const last = events[events.length - 1];
        if (!last || last.eventNumber !== data.num || last.startPage !== i) {
          events.push({
            eventNumber: data.num,
            type: data.type,
            date: data.date,
            startPage: i,
            rawHeader: m[0].substring(0, 120)
          });
        }
        break;
      }
    }
  }

  // Set endPage for each event
  for (let i = 0; i < events.length; i++) {
    events[i].endPage = i < events.length - 1 ? events[i+1].startPage - 1 : numPages;
    events[i].pageCount = events[i].endPage - events[i].startPage + 1;
  }

  return { events, processNumber: detectedProcessNumber, totalPages: numPages, allPagesText };
}

// Detect jurisprudence citations
function detectCitations(text) {
  const patterns = {
    'Processo CNJ': /\b\d{7}-\d{2}\.\d{4}\.\d\.\d{2}\.\d{4}\b/g,
    'AgRg/AgInt em REsp': /Ag(?:Rg|Int)\s+(?:no\s+)?(?:A?REsp)\s*(?:n[°º.]?\s*)?[\d.]+(?:\/[A-Z]{2})?/gi,
    'AgRg/AgInt em RE': /Ag(?:Rg|Int)\s+(?:no\s+)?A?RE\s*(?:n[°º.]?\s*)?[\d.]+(?:\/[A-Z]{2})?/gi,
    'REsp': /\bREsp\s*(?:n[°º.]?\s*)?[\d.]+(?:\/[A-Z]{2})?/gi,
    'AREsp': /\bAREsp\s*(?:n[°º.]?\s*)?[\d.]+(?:\/[A-Z]{2})?/gi,
    'RE': /\bRE\s*(?:n[°º.]?\s*)?[\d.]{4,}(?:\/[A-Z]{2})?/gi,
    'ARE': /\bARE\s*(?:n[°º.]?\s*)?[\d.]+(?:\/[A-Z]{2})?/gi,
    'HC': /\bHC\s*(?:n[°º.]?\s*)?[\d.]{4,}(?:\/[A-Z]{2})?/gi,
    'MS': /\bMS\s*(?:n[°º.]?\s*)?[\d.]{4,}(?:\/[A-Z]{2})?/gi,
    'ADI': /\bADI\s*(?:n[°º.]?\s*)?[\d.]+/gi,
    'ADC': /\bADC\s*(?:n[°º.]?\s*)?[\d.]+/gi,
    'ADPF': /\bADPF\s*(?:n[°º.]?\s*)?[\d.]+/gi,
    'Tema STF': /Tema\s+(?:n[°º.]?\s*)?(\d+)\s+(?:do\s+|da\s+)?STF/gi,
    'Tema STJ': /Tema\s+(?:n[°º.]?\s*)?(\d+)\s+(?:do\s+|da\s+)?STJ/gi,
    'Tema (genérico)': /Tema\s+(?:n[°º.]?\s*)?\d{1,4}\b/gi,
    'Súmula Vinculante': /S[úu]mula\s+Vinculante\s+(?:n[°º.]?\s*)?\d+/gi,
    'Súmula STF': /S[úu]mula\s+(?:n[°º.]?\s*)?\d+\s+(?:do\s+|da\s+)?STF/gi,
    'Súmula STJ': /S[úu]mula\s+(?:n[°º.]?\s*)?\d+\s+(?:do\s+|da\s+)?STJ/gi,
    'Súmula TST': /S[úu]mula\s+(?:n[°º.]?\s*)?\d+\s+(?:do\s+|da\s+)?TST/gi,
    'Súmula (genérica)': /S[úu]mula\s+(?:n[°º.]?\s*)?\d+/gi,
  };
  const found = {};
  for (const [type, re] of Object.entries(patterns)) {
    const matches = [...text.matchAll(re)];
    if (matches.length) {
      const unique = [...new Set(matches.map(m => m[0].trim().replace(/\s+/g, ' ')))];
      found[type] = unique.sort();
    }
  }
  return found;
}

// Anonymize sensitive data
function anonymizeText(text) {
  return text
    // CPF formatted: 123.456.789-01
    .replace(/\b\d{3}\.\d{3}\.\d{3}-\d{2}\b/g, '[CPF]')
    // CNPJ formatted: 12.345.678/0001-90
    .replace(/\b\d{2}\.\d{3}\.\d{3}\/\d{4}-\d{2}\b/g, '[CNPJ]')
    // CNPJ raw 14 digits
    .replace(/\b\d{14}\b/g, '[CNPJ?]')
    // CPF raw 11 digits (be careful not to match other things — only when preceded by CPF context or surrounded by whitespace)
    .replace(/(?<![\d.\-/])\d{11}(?![\d.\-/])/g, '[CPF?]')
    // RG: varies by state; common formats
    .replace(/\b\d{1,2}\.?\d{3}\.?\d{3}-?[\dXx]\b/g, m => m.replace(/\d/g, '#').replace(/[Xx]/g, '#') === m ? m : '[RG]')
    // Phone: (11) 91234-5678 or (11) 1234-5678
    .replace(/\(\d{2}\)\s*9?\d{4}-?\d{4}/g, '[TEL]')
    // CEP
    .replace(/\b\d{5}-?\d{3}\b/g, '[CEP]')
    // Email
    .replace(/\b[\w._%+-]+@[\w.-]+\.[A-Za-z]{2,}\b/g, '[EMAIL]')
    // Bank
    .replace(/Ag[êe]ncia\s*:?\s*\d{1,5}[-\s]?\d?/gi, 'Agência: [AG]')
    .replace(/(C\/C|Conta\s+Corrente|Conta)\s*:?\s*\d{4,}[-\s]?\d/gi, 'Conta: [CC]')
    // Credit card-like
    .replace(/\b\d{4}[\s-]?\d{4}[\s-]?\d{4}[\s-]?\d{4}\b/g, '[CARTÃO]');
}

// Detect deadlines from intimations
function addBusinessDays(date, days) {
  const result = new Date(date);
  let added = 0;
  while (added < days) {
    result.setDate(result.getDate() + 1);
    const day = result.getDay();
    if (day !== 0 && day !== 6) added++;
  }
  return result;
}

function detectDeadlines(text, events) {
  const intimationRe = /(intima(?:ção|do|r|tória)|publica(?:ção|do)|ci[êe]ncia|notifica(?:ção|do))\s+(?:em\s+|de\s+)?(\d{2}\/\d{2}\/\d{4})/gi;
  const found = [...text.matchAll(intimationRe)].map(m => ({
    type: m[1],
    date: m[2],
    context: text.substring(Math.max(0, m.index - 50), Math.min(text.length, m.index + 100)).replace(/\s+/g, ' ').trim()
  }));

  // Sort by date desc (most recent first)
  found.sort((a, b) => {
    const [da, ma, ya] = a.date.split('/').map(Number);
    const [db, mb, yb] = b.date.split('/').map(Number);
    return new Date(yb, mb-1, db) - new Date(ya, ma-1, da);
  });

  // Calculate deadlines for the most recent intimation, if any
  let analysis = null;
  if (found.length > 0) {
    const last = found[0];
    const [d, m, y] = last.date.split('/').map(Number);
    const intimationDate = new Date(y, m-1, d);
    const today = new Date();
    today.setHours(0,0,0,0);

    const commonDeadlines = [5, 10, 15, 30];
    const deadlines = commonDeadlines.map(days => {
      const deadline = addBusinessDays(intimationDate, days);
      const remaining = Math.ceil((deadline - today) / (1000*60*60*24));
      return { days, deadline, remaining };
    });
    analysis = { lastIntimation: last, intimationDate, deadlines };
  }

  return { intimations: found, analysis };
}

// Extract tables by clustering text by Y coordinate
async function processExtractTables(pdfBytes, progressCb = null) {
  const pdfDoc = await pdfjsLib.getDocument({ data: pdfBytes.slice(0) }).promise;
  const tables = [];
  for (let i = 1; i <= pdfDoc.numPages; i++) {
    if (progressCb) progressCb(i, pdfDoc.numPages);
    const page = await pdfDoc.getPage(i);
    const items = (await page.getTextContent()).items;
    if (items.length === 0) continue;

    // Group by Y coordinate (rounded to handle minor variations)
    const rowMap = new Map();
    for (const item of items) {
      const y = Math.round(item.transform[5]);
      if (!rowMap.has(y)) rowMap.set(y, []);
      rowMap.get(y).push({ text: item.str.trim(), x: item.transform[4] });
    }
    // Sort rows top to bottom
    const rows = [...rowMap.entries()]
      .sort((a, b) => b[0] - a[0])
      .map(([y, cells]) => cells.sort((a, b) => a.x - b.x).filter(c => c.text));

    // Detect table candidates: groups of consecutive rows with 3+ cells
    let currentTable = [], currentStartY = null;
    for (const row of rows) {
      if (row.length >= 3) {
        currentTable.push(row.map(c => c.text));
      } else {
        if (currentTable.length >= 3) {
          tables.push({ page: i, rows: currentTable });
        }
        currentTable = [];
      }
    }
    if (currentTable.length >= 3) tables.push({ page: i, rows: currentTable });
  }
  return tables;
}

function tablesToCsv(tables) {
  let csv = '';
  for (const t of tables) {
    csv += `# Página ${t.page}\n`;
    for (const row of t.rows) {
      csv += row.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',') + '\n';
    }
    csv += '\n';
  }
  return csv;
}

// ============== SINGLE MODE ACTIONS ==============

function parsePageRange(input, max) {
  const result = new Set();
  for (const part of input.split(',').map(s => s.trim())) {
    if (!part) continue;
    if (part.includes('-')) {
      const [a, b] = part.split('-').map(s => parseInt(s.trim()));
      if (isNaN(a) || isNaN(b)) throw new Error(`Intervalo inválido: ${part}`);
      for (let i = Math.min(a,b); i <= Math.max(a,b); i++) {
        if (i >= 1 && i <= max) result.add(i);
      }
    } else {
      const n = parseInt(part);
      if (isNaN(n)) throw new Error(`Número inválido: ${part}`);
      if (n >= 1 && n <= max) result.add(n);
    }
  }
  return Array.from(result).sort((a,b) => a-b);
}

function generateIndexMarkdown(indexed, baseName) {
  let md = `# Índice de eventos · ${baseName}\n\n`;

  md += `**Total de páginas:** ${indexed.totalPages}\n**Eventos detectados:** ${indexed.events.length}\n\n---\n\n`;

  return md;
}

      const dl = detectDeadlines(text, indexed.events);
      showToolResult({
        summary: dl.lastIntimation ? `Intimação detectada: ${dl.lastIntimation.type} em ${dl.lastIntimation.date}` : 'Nenhuma intimação detectada',
        custom: !dl.lastIntimation ? '<p style="color: var(--uc-warm-gray);">Nenhuma intimação encontrada no texto.</p>' : `
          <div class="card mb-3">
            <p style="font-size: 13px;"><strong>Última intimação:</strong> ${escapeHtml(dl.lastIntimation.type)} em <strong>${escapeHtml(dl.lastIntimation.date)}</strong></p>
            <p class="help-text" style="margin-top: 4px;">"${escapeHtml(dl.lastIntimation.context.substring(0, 200))}..."</p>
          </div>
          <h4 class="font-serif font-semibold smallcaps mb-2">Cálculos (dias úteis)</h4>
          ${dl.deadlines.map(d => `
            <div class="deadline-row ${d.remaining < 0 ? 'expired' : d.remaining <= 5 ? 'urgent' : d.remaining <= 14 ? 'warning' : 'safe'}">
              <div><strong>${d.days} dias úteis</strong><div class="help-text">vencimento ${d.deadline.toLocaleDateString('pt-BR')}</div></div>
              <span class="badge ${d.remaining < 0 ? 'badge-red' : d.remaining <= 5 ? 'badge-red' : d.remaining <= 14 ? 'badge-amber' : 'badge-green'}">${d.remaining > 0 ? d.remaining + 'd' : 'EXPIRADO ' + Math.abs(d.remaining) + 'd'}</span>
            </div>
          `).join('')}
          <p class="help-text" style="margin-top: 12px;">⚠️ Cálculos não consideram feriados, suspensões processuais ou prazos especiais. Sempre confirme manualmente.</p>
        `
      });
    } else if (action === 'anonymize') {
      progressCb('Extraindo texto...', 0.5);
      const text = await processExtractText(bytes);
      const r = anonymizeText(text);
      const blob = new Blob([r.text], { type: 'text/plain;charset=utf-8' });
      showToolResult({ blob, name: baseName + '_anonimizado.txt', summary: `${r.replacements} dados pessoais anonimizados`, preview: r.text.slice(0, 500) });
    } else if (action === 'extractTables') {
      const tables = await processExtractTables(bytes, progressCb);
      if (tables.length === 0) {
        showToolResult({ summary: 'Nenhuma tabela detectada', custom: '<p style="color: var(--uc-warm-gray);">Detecção heurística não encontrou tabelas. PDFs scaneados precisam de OCR primeiro.</p>' });
      } else {
        const csv = tablesToCsv(tables);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
        showToolResult({ blob, name: baseName + '_tabelas.csv', summary: `${tables.length} tabela(s) detectada(s)`, preview: csv.slice(0, 500) });
      }
    } else if (action === 'claudePackage') {
      progressCb('Indexando autos...', 0.3);
      const indexed = await processIndexAutos(bytes);
      progressCb('Extraindo texto...', 0.6);
      const fullText = await processExtractText(bytes);
      const citations = detectCitations(fullText);
      const dl = detectDeadlines(fullText, indexed.events);
      // Save to process if linked
      if (_toolsState.linkedProcessId) {
        await saveIndexedToProcess(_toolsState.linkedProcessId, indexed, _toolsState.fileName, bytes);
        // Also save jurisprudence
        for (const [type, items] of Object.entries(citations)) {
          for (const cit of items) {
            await DB.saveJurisprudence({ id: uid(), processId: _toolsState.linkedProcessId, type, citation: cit, source: _toolsState.fileName, addedAt: Date.now() });
          }
        }
      }
      const md = generateLegacyClaudePackage(_toolsState.fileName, indexed, fullText, citations, dl);
      const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
      const totalCitations = Object.values(citations).reduce((s,a) => s+a.length, 0);
      showToolResult({
        blob, name: baseName + '_pacote_claude.md',
        summary: `Pacote pronto · ${indexed.events.length} eventos · ${totalCitations} citações${_toolsState.linkedProcessId ? ' · salvo no processo' : ''}`,
        actions: _toolsState.linkedProcessId ? [{ label: 'Ir ao processo →', cb: `navigate('process', { currentProcessId: '${_toolsState.linkedProcessId}' })` }] : []
      });
    }
  } catch(err) {
    console.error(err);
    ra.innerHTML = `<div class="card" style="border-left: 3px solid var(--uc-red);"><strong style="color: var(--uc-red);">Erro</strong><p>${escapeHtml(err.message)}</p></div>`;
    toast('Erro ao processar', err.message, 'error');
  }
}

function showToolResult({ blob = null, name = '', summary = '', preview = null, custom = null, actions = [] }) {
  const ra = $('toolResultArea');
  ra.innerHTML = `
    <div class="card card-gold-border fade-in">
      <h3 class="font-serif text-lg font-semibold smallcaps mb-2" style="color: var(--uc-black);">✓ Concluído</h3>
      <p style="color: var(--uc-graphite); margin-bottom: 12px;">${escapeHtml(summary)}</p>
      ${custom || ''}
      ${preview ? `<details class="mt-3"><summary style="cursor:pointer; font-weight: 500;">Pré-visualizar texto</summary><pre style="background: var(--uc-cream); padding: 12px; border-radius: 6px; max-height: 200px; overflow: auto; font-size: 12px; white-space: pre-wrap; margin-top: 8px;">${escapeHtml(preview)}...</pre></details>` : ''}
      <div class="flex gap-2 flex-wrap mt-3">
        ${blob ? `<button class="btn btn-primary btn-sm" id="_dlBtn">⬇ Baixar ${escapeHtml(name)}</button>` : ''}
        ${actions.map((a, i) => `<button class="btn btn-outline btn-sm" onclick="${a.cb}">${escapeHtml(a.label)}</button>`).join('')}
      </div>
    </div>
  `;
  if (blob) $('_dlBtn').onclick = () => downloadBlob(blob, name);
  ra.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

async function saveIndexedToProcess(processId, indexed, sourceFileName, bytes) {
  // Save events
  for (const e of indexed.events) {
    const event = {
      id: uid(), processId,
      eventNumber: e.eventNumber,
      type: e.type, date: e.date,
      startPage: e.startPage, endPage: e.endPage, pageCount: e.pageCount,
      sourceFile: sourceFileName, addedAt: Date.now()
    };
    await DB.saveEvent(event);
  }
  // Save PDF blob
  const blob = new Blob([bytes], { type: 'application/pdf' });
  await DB.savePdf({ id: uid(), processId, blob, name: sourceFileName, addedAt: Date.now() });
}

function generateLegacyClaudePackage(fileName, indexed, fullText, citations, deadlines) {
  let md = `# Pacote para análise: ${fileName}\n\n`;
  md += `**Gerado em:** ${new Date().toLocaleString('pt-BR')}\n\n`;
  if (indexed.processNumber) md += `**Processo:** ${indexed.processNumber}\n\n`;
  md += `---\n\n## Estatísticas\n\n- **Páginas:** ${indexed.totalPages}\n- **Eventos:** ${indexed.events.length}\n- **Caracteres:** ${fullText.length.toLocaleString('pt-BR')}\n\n`;
  md += `## Cronologia\n\n| Ev | Data | Tipo | Pgs |\n|---|---|---|---|\n`;
  indexed.events.forEach(e => md += `| ${e.eventNumber} | ${e.date || '—'} | ${e.type.replace(/\|/g,'/')} | ${e.startPage}–${e.endPage} |\n`);
  md += `\n## Jurisprudência detectada\n\n`;
  Object.entries(citations).forEach(([t, items]) => { if (items.length > 0) md += `**${t}:** ${items.join('; ')}\n\n`; });
  if (deadlines.lastIntimation) {
    md += `\n## Prazos\n\n**Última intimação:** ${deadlines.lastIntimation.type} em ${deadlines.lastIntimation.date}\n\n`;
    deadlines.deadlines.forEach(d => md += `- ${d.days} dias úteis → ${d.deadline.toLocaleDateString('pt-BR')} (${d.remaining > 0 ? d.remaining + ' dias restantes' : 'EXPIRADO há ' + Math.abs(d.remaining) + ' dias'})\n`);
  }
  md += `\n---\n\n## Texto integral\n\n${fullText}\n\n---\n\n## Prompt\n\n\`\`\`\n${DEFAULT_PROMPT_TEMPLATE}\n\`\`\`\n`;
  return md;
}

async function quickCalcDeadline() {
  const r = await showModal('Calcular prazo', [
    { label: 'Data da intimação/publicação', type: 'date' },
    { label: 'Prazo (dias úteis)', type: 'number', default: '15', min: '1', max: '365' }
  ], { confirmLabel: 'Calcular' });
  if (!r) return;
  const [date, days] = r;
  if (!date) { toast('Informe a data', '', 'error'); return; }
  const intDate = new Date(date + 'T12:00:00');
  const dl = addBusinessDays(intDate, parseInt(days));
  const today = new Date(); today.setHours(0,0,0,0);
  const remaining = Math.ceil((dl - today) / 86400000);
  toast(`Vencimento: ${dl.toLocaleDateString('pt-BR')}`, `${remaining > 0 ? remaining + ' dias úteis restantes' : 'EXPIRADO há ' + Math.abs(remaining) + ' dias'}`, remaining > 0 ? 'success' : 'error');
  // Show a result card too
  $('appContent').insertAdjacentHTML('afterbegin', `
    <div class="card card-gold-border fade-in mb-4">
      <p class="smallcaps text-xs" style="color: var(--uc-gold); font-weight: 600;">Cálculo de prazo</p>
      <p class="font-serif text-2xl font-semibold mt-1" style="color: var(--uc-black);">${dl.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' })}</p>
      <p style="font-size: 14px; color: var(--uc-graphite); margin-top: 4px;">${days} dias úteis a partir de ${intDate.toLocaleDateString('pt-BR')}</p>
      <p style="margin-top: 8px;"><span class="badge ${remaining < 0 ? 'badge-red' : remaining <= 5 ? 'badge-red' : remaining <= 14 ? 'badge-amber' : 'badge-green'}">${remaining > 0 ? remaining + ' dias úteis restantes' : 'EXPIRADO há ' + Math.abs(remaining) + ' dias'}</span></p>
      <p class="help-text mt-2">⚠️ Não considera feriados forenses ou suspensões processuais.</p>
    </div>
  `);
}

async function quickPhotoOcr() {
  // Trigger file input with capture=camera
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.capture = 'environment';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    toast('Processando OCR...', 'Pode demorar alguns segundos', 'info');
    try {
      const w = await getTesseractWorker('por');
      const r = await w.recognize(file);
      const text = r.data.text;
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      $('appContent').insertAdjacentHTML('afterbegin', `
        <div class="card card-gold-border fade-in mb-4">
          <h4 class="font-serif font-semibold smallcaps mb-2">Texto reconhecido</h4>
          <p class="help-text">${text.length} caracteres · confiança ${Math.round(r.data.confidence)}%</p>
          <pre style="background: var(--uc-cream); padding: 12px; border-radius: 6px; max-height: 300px; overflow: auto; font-size: 13px; white-space: pre-wrap; margin: 8px 0;">${escapeHtml(text.slice(0, 1500))}${text.length > 1500 ? '\n\n...' : ''}</pre>
          <button class="btn btn-secondary btn-sm" id="_ocrDl">⬇ Baixar texto</button>
        </div>
      `);
      $('_ocrDl').onclick = () => downloadBlob(blob, 'ocr_diligencia.txt');
    } catch(err) {
      toast('Erro no OCR', err.message, 'error');
    }
  };
  input.click();
}

function setupSettingsHandlers(tab) {
  if (tab === 'backup') {
    const cb = $('backupReminderToggle');
    if (cb) cb.onchange = async (e) => {
      state.settings.backupReminder = e.target.checked;
      await DB.setSetting('backupReminder', e.target.checked);
      toast('Preferência salva', '', 'success');
    };
  }
  if (tab === 'djen') {
    // Load fresh data and re-render if cache was empty
    djenLoadSettingsCache().then(() => {
      if (!state._djenRenderedFresh) {
        state._djenRenderedFresh = true;
        renderSettings();
      } else {
        state._djenRenderedFresh = false;
      }
    });
    const saveBtn = $('djenSaveSettings');
    if (saveBtn) saveBtn.onclick = async () => {
      const lookback = parseInt($('djenLookbackInput').value) || 7;
      const workerUrl = $('djenWorkerInput').value.trim();
      const datajudWorkerInput = $('datajudWorkerInput');
      const datajudWorkerUrl = datajudWorkerInput ? datajudWorkerInput.value.trim() : '';
      await DB.setSetting('djenLookbackDays', lookback);
      await DB.setSetting('djenWorkerUrl', workerUrl || null);
      await DB.setSetting('datajudWorkerUrl', datajudWorkerUrl || null);
      state._djenCache = { ...state._djenCache, lookback, workerUrl, datajudWorkerUrl };
      toast('Configurações salvas', '', 'success');
    };
  }
  if (tab === 'about') {
    if (state.installPrompt) {
      $('installSection').classList.remove('hidden');
      $('installBtn').onclick = async () => {
        state.installPrompt.prompt();
        const r = await state.installPrompt.userChoice;
        if (r.outcome === 'accepted') toast('Instalado!', '', 'success');
        state.installPrompt = null;
        $('installSection').classList.add('hidden');
      };
    }
  }
}

async function djenLoadSettingsCache() {
  const oabs = await DB.getSetting('djenOabs', DJEN_DEFAULT_OABS);

  const datajudWorkerUrl = await DB.getSetting('datajudWorkerUrl', '') || '';
  const lastFetch = await DB.getSetting('djenLastFetch', null);
  state._djenCache = { oabs, lookback, workerUrl, datajudWorkerUrl, lastFetch };
}

async function exportBackup() {
  const data = {
    version: 4,
    generatedAt: Date.now(),
    processes: await DB.getAllProcesses(),
    events: [],
    deadlines: await DB.getAllDeadlines(),
    notes: [],
    jurisprudence: [],
    prompts: await DB.getAllPrompts(),
    djenPublications: await DB.getAllDjenPublications(),
    settings: {
      theme: state.settings.theme,
      backupReminder: state.settings.backupReminder,
      defaultPromptId: await DB.getSetting('defaultPromptId'),
      djenOabs: await DB.getSetting('djenOabs', DJEN_DEFAULT_OABS),
      djenLookbackDays: await DB.getSetting('djenLookbackDays', 7),
      djenWorkerUrl: await DB.getSetting('djenWorkerUrl', null),
      datajudWorkerUrl: await DB.getSetting('datajudWorkerUrl', null),
      djenLastFetch: await DB.getSetting('djenLastFetch', null)
    }
  };
  // Get all events/notes/jurisprudence per process
  for (const p of data.processes) {
    const evts = await DB.getEventsByProcess(p.id);
    const notes = await DB.getNotesByProcess(p.id);
    const juris = await DB.getJurisprudenceByProcess(p.id);
    data.events.push(...evts);
    data.notes.push(...notes);
    data.jurisprudence.push(...juris);
  }
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const ts = new Date().toISOString().slice(0,10);
  downloadBlob(blob, `uc-juridico-backup-${ts}.json`);
  state.settings.lastBackupAt = Date.now();
  await DB.setSetting('lastBackupAt', state.settings.lastBackupAt);
  toast('Backup exportado', `${data.processes.length} processos · ${data.events.length} eventos · ${data.deadlines.length} prazos · ${data.djenPublications.length} DJEN`, 'success');
}

async function importBackupFlow() {
  const ok = await confirmDialog(
    'Importar backup?',
    'Os dados atuais SERÃO SUBSTITUÍDOS pelos dados do arquivo. Esta ação não pode ser desfeita. Faça backup do estado atual antes, se necessário.',
    true
  );
  if (!ok) return;
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!data.version || !Array.isArray(data.processes)) throw new Error('Arquivo inválido');
      // Wipe current data
      for (const p of await DB.getAllProcesses()) await DB.deleteProcess(p.id);
      for (const pr of await DB.getAllPrompts()) await DB.deletePrompt(pr.id);
      // Import
      for (const p of data.processes) await dbPromise('processes', 'readwrite', s => s.put(p));
      for (const e of (data.events || [])) await dbPromise('events', 'readwrite', s => s.put(e));
      for (const d of (data.deadlines || [])) await dbPromise('deadlines', 'readwrite', s => s.put(d));
      for (const n of (data.notes || [])) await dbPromise('notes', 'readwrite', s => s.put(n));
      for (const j of (data.jurisprudence || [])) await dbPromise('jurisprudence', 'readwrite', s => s.put(j));
      for (const pr of (data.prompts || [])) await DB.savePrompt(pr);
      // DJEN restore (v4.1+)
      if (db.objectStoreNames.contains('djen_publications')) {
        for (const dp of (data.djenPublications || [])) await dbPromise('djen_publications', 'readwrite', s => s.put(dp));
      }
      if (data.settings) {
        if (data.settings.defaultPromptId) await DB.setSetting('defaultPromptId', data.settings.defaultPromptId);
        if (data.settings.theme) await DB.setSetting('theme', data.settings.theme);
        if (data.settings.djenOabs) await DB.setSetting('djenOabs', data.settings.djenOabs);
        if (data.settings.djenLookbackDays) await DB.setSetting('djenLookbackDays', data.settings.djenLookbackDays);
        if (data.settings.djenWorkerUrl) await DB.setSetting('djenWorkerUrl', data.settings.djenWorkerUrl);
        if (data.settings.datajudWorkerUrl) await DB.setSetting('datajudWorkerUrl', data.settings.datajudWorkerUrl);
      }
      toast('Backup importado', `${data.processes.length} processos restaurados`, 'success');
      navigate('dashboard');
    } catch(err) {
      toast('Erro ao importar', err.message, 'error');
    }
  };
  input.click();
}

async function wipeAllData() {
  const c1 = await confirmDialog('Apagar TODOS os dados?', 'Isso removerá processos, eventos, prazos, notas, jurisprudência, PDFs, prompts personalizados e histórico DJEN. Faça backup antes!', true);
  if (!c1) return;
  const c2 = await confirmDialog('Tem certeza absoluta?', 'Última chance. Esta ação é PERMANENTE.', true);
  if (!c2) return;
  for (const store of ['processes', 'events', 'deadlines', 'notes', 'jurisprudence', 'pdfs', 'prompts', 'djen_publications']) {
    if (db.objectStoreNames.contains(store)) {
      await dbPromise(store, 'readwrite', s => s.clear());
    }
  }
  toast('Dados apagados', 'Tudo limpo.', 'success');
  navigate('dashboard');
}

// Cache local de consultas DataJud (evita pesquisa repetida no mesmo CNJ)
const datajudCache = new Map();

// ----------------------------------------------------------------------------
// Resolução do endpoint a partir do CNJ
// ----------------------------------------------------------------------------
function datajudResolveEndpoint(cnj) {
  const digits = String(cnj || '').replace(/\D/g, '');
  if (digits.length !== 20) {
    return { ok: false, error: 'CNJ deve ter 20 dígitos. Recebi: ' + digits.length };
  }
  // Posições no CNJ NNNNNNN-DD.AAAA.J.TR.OOOO (sem separadores: 0-19)
  // J = posição 13, TR = posições 14-15
  const j = digits.substring(13, 14);
  const tr = digits.substring(14, 16);
  const key = `${j}.${tr}`;
  const tribunal = DATAJUD_TRIBUNAIS[key];
  if (!tribunal) {
    return { ok: false, error: `Tribunal não reconhecido: J=${j}, TR=${tr}. CNJ pode estar inválido.` };
  }
  return { ok: true, tribunal, key };
}

// ----------------------------------------------------------------------------
// Consulta principal ao DataJud
// ----------------------------------------------------------------------------
async function datajudFetch(cnj) {
  const normalized = String(cnj || '').replace(/\D/g, '');
  
  // Cache hit
  if (datajudCache.has(normalized)) {
    return datajudCache.get(normalized);
  }

  // Resolve endpoint
  const resolved = datajudResolveEndpoint(normalized);
  if (!resolved.ok) {
    throw new Error(resolved.error);
  }

  // Obter URL da Worker — preferir datajudWorkerUrl (separada), fallback para djenWorkerUrl (unificada)
  const datajudUrl = await DB.getSetting('datajudWorkerUrl', null);
  const djenUrl = await DB.getSetting('djenWorkerUrl', null);
  const workerUrl = datajudUrl || djenUrl;
  if (!workerUrl) {
    throw new Error('Configure a Cloudflare Worker em Configurações → DJEN (campo "Endpoint DataJud") antes de usar a integração DataJud.');
  }

  // Construir URL da Worker para DataJud.
  // Se a Worker for a DataJud-only (URL própria), o path é /api_publica_TRIBUNAL/_search
  // Se for a Worker unificada do DJEN (mesma URL), o path é /datajud/api_publica_TRIBUNAL/_search
  const baseUrl = workerUrl.replace(/\/$/, ''); // remove trailing slash
  const useUnifiedPath = !datajudUrl && djenUrl; // fallback para Worker unificada
  const url = useUnifiedPath
    ? `${baseUrl}/datajud/api_publica_${resolved.tribunal}/_search`
    : `${baseUrl}/api_publica_${resolved.tribunal}/_search`;

  // Body Elasticsearch — busca pelo número do processo
  const body = {
    query: {
      match: {
        numeroProcesso: normalized
      }
    },
    size: 1
  };

  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!resp.ok) {
    throw new Error(`API DataJud retornou HTTP ${resp.status}: ${resp.statusText}`);
  }

  const data = await resp.json();
  
  // Verificar resultado
  if (!data.hits || !data.hits.hits || data.hits.hits.length === 0) {
    throw new Error('Processo não encontrado no DataJud. Pode ser sigiloso, ainda não distribuído ou CNJ inválido.');
  }

  const proc = data.hits.hits[0]._source;
  const result = datajudParseProcess(proc, resolved.tribunal);
  
  // Cache (válido para a sessão atual)
  datajudCache.set(normalized, result);
  
  return result;
}

// ----------------------------------------------------------------------------
// Parser do retorno DataJud → estrutura interna do app
// ----------------------------------------------------------------------------
function datajudParseProcess(proc, tribunalAlias) {
  const cnjFormatted = normalizeCnj(proc.numeroProcesso);
  
  // Classe processual
  const classe = proc.classe || {};
  const className = classe.nome || 'Não informada';
  const classCode = classe.codigo || '';

  // Órgão julgador / vara
  const orgao = proc.orgaoJulgador || {};
  const orgaoNome = orgao.nome || '';
  
  // Sistema processual
  const sistema = proc.sistema?.nome || '';
  
  // Assuntos
  const assuntos = (proc.assuntos || []).map(a => a.nome).filter(Boolean);
  
  // Movimentações ordenadas (mais recentes primeiro)
  const movimentos = (proc.movimentos || [])
    .map(m => ({
      codigo: m.codigo,
      nome: TPU_MOVIMENTOS[m.codigo] || m.nome || `Movimentação cód. ${m.codigo}`,
      data: m.dataHora ? m.dataHora.substring(0, 10) : null,
      complemento: (m.complementosTabelados || []).map(c => c.descricao || c.nome).join(' · ') || null
    }))
    .sort((a, b) => (b.data || '').localeCompare(a.data || ''));

  // Tribunal humano-legível
  const tribunalNome = datajudTribunalNome(tribunalAlias);
  
  // Inferir área a partir da classe processual
  const area = datajudInferArea(className, classCode);

  return {
    cnj: cnjFormatted,
    cnjRaw: proc.numeroProcesso,
    tribunal: tribunalNome,
    tribunalAlias,
    grau: proc.grau || '',
    orgaoJulgador: orgaoNome,
    classe: className,
    classeCodigo: classCode,
    assuntos,
    valorCausa: proc.valorCausa || null,
    dataAjuizamento: proc.dataAjuizamento ? proc.dataAjuizamento.substring(0, 10) : null,
    sistema,
    formato: proc.formato?.nome || '',
    nivelSigilo: proc.nivelSigilo || 0,
    movimentos: movimentos.slice(0, 50), // limite para não inflar
    movimentosTotal: movimentos.length,
    area,
    raw: proc // mantém raw para debug
  };
}

function datajudTribunalNome(alias) {
  const map = {
    'tjsp': 'TJSP', 'tjgo': 'TJGO', 'tjdft': 'TJDFT', 'tjmg': 'TJMG',
    'tjrj': 'TJRJ', 'tjrs': 'TJRS', 'tjsc': 'TJSC', 'tjpr': 'TJPR',
    'tjba': 'TJBA', 'tjpe': 'TJPE', 'tjce': 'TJCE', 'tjma': 'TJMA',
    'tjpa': 'TJPA', 'tjmt': 'TJMT', 'tjms': 'TJMS', 'tjto': 'TJTO',
    'tjpi': 'TJPI', 'tjes': 'TJES', 'tjac': 'TJAC', 'tjam': 'TJAM',
    'tjap': 'TJAP', 'tjal': 'TJAL', 'tjse': 'TJSE', 'tjrn': 'TJRN',
    'tjpb': 'TJPB', 'tjro': 'TJRO', 'tjrr': 'TJRR',
    'trf1': 'TRF-1', 'trf2': 'TRF-2', 'trf3': 'TRF-3',
    'trf4': 'TRF-4', 'trf5': 'TRF-5', 'trf6': 'TRF-6',
    'tst': 'TST', 'stj': 'STJ', 'tse': 'TSE', 'stm': 'STM'
  };
  if (map[alias]) return map[alias];
  if (alias.startsWith('trt')) return 'TRT-' + alias.replace('trt', '');
  if (alias.startsWith('tre-')) return 'TRE-' + alias.replace('tre-', '').toUpperCase();
  return alias.toUpperCase();
}

function datajudInferArea(className, classCode) {
  const c = (className || '').toLowerCase();
  if (/execu[çc][ãa]o fiscal|fiscal|imposto|tribut/i.test(c)) return 'Execução Fiscal';
  if (/recupera[çc][ãa]o judicial|fal[êe]ncia|insolv/i.test(c)) return 'Recuperacional';
  if (/mandado de seguran[çc]a|mandado/i.test(c)) return 'Constitucional';
  if (/tribut[áa]ri|fiscal|cont[áa]bil/i.test(c)) return 'Tributário';
  if (/trabalh|reclamat[óo]ria/i.test(c)) return 'Trabalhista';
  if (/penal|crime|criminal/i.test(c)) return 'Criminal';
  if (/famil|div[óo]rcio|aliment|guarda/i.test(c)) return 'Família';
  if (/sucess|invent[áa]rio|herd/i.test(c)) return 'Sucessões';
  if (/consum/i.test(c)) return 'Consumidor';
  if (/administrat/i.test(c)) return 'Administrativo';
  return 'Cível';
}

async function datajudPullForNewProcess() {
  const cnjInput = document.getElementById('newProcessCnj');
  if (!cnjInput) return;
  const cnj = cnjInput.value.trim();
  if (!cnj) {
    toast('Informe o CNJ primeiro', 'Cole o número do processo no campo acima', 'error');
    cnjInput.focus();
    return;
  }
  
  // Resolve endpoint para validar antes de chamar
  const resolved = datajudResolveEndpoint(cnj);
  if (!resolved.ok) {
    toast('CNJ inválido', resolved.error, 'error');
    return;
  }

  // Mostra loading
  const btn = document.getElementById('datajudPullBtn');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-mini"></span> Consultando…';
  }

  try {
    const data = await datajudFetch(cnj);
    
    // Preenche os campos do formulário
    const setIfEmpty = (id, value) => {
      const el = document.getElementById(id);
      if (el && !el.value && value) el.value = value;
    };
    const setAlways = (id, value) => {
      const el = document.getElementById(id);
      if (el && value) el.value = value;
    };
    
    // Tribunal sempre atualiza (foi a fonte autoritativa)
    setAlways('newProcessCourt', `${data.tribunal} · ${data.orgaoJulgador}`);
    
    // Tipo (classe) e área — atualiza se vazio
    setIfEmpty('newProcessType', data.classe);
    setIfEmpty('newProcessArea', data.area);
    
    // Nome sugerido se vazio

    if (nameEl && !nameEl.value) {
      nameEl.value = `${data.classe} · ${data.cnj}`;

async function datajudRefreshProcess(processId) {
  const proc = await DB.getProcess(processId);
  if (!proc || !proc.cnj) {
    toast('Processo sem CNJ', 'Cadastre o CNJ antes de atualizar do DataJud', 'error');
    return;
  }

  const ok = await confirmDialog('Atualizar do DataJud?',
    `Vou consultar o DataJud para o CNJ ${proc.cnj}. Os campos preenchidos do processo serão atualizados; suas notas, prazos e jurisprudência permanecem.`,
    false);
  if (!ok) return;

  // Mostrar modal de progresso simples
  const progressModal = document.createElement('div');
  progressModal.className = 'modal-backdrop';
  progressModal.innerHTML = `
    <div class="modal" style="max-width: 380px;">
      <h3 class="modal-title">Consultando DataJud…</h3>
      <div class="flex items-center gap-3" style="margin: 12px 0;">
        <div class="spinner"></div>
        <div>
          <div style="font-weight: 600;">${escapeHtml(proc.name)}</div>
          <div class="help-text">${escapeHtml(proc.cnj)}</div>
        </div>
      </div>
    </div>`;
  $('modalContainer').appendChild(progressModal);

  try {
    const data = await datajudFetch(proc.cnj);
    
    // Atualiza campos
    proc.court = `${data.tribunal} · ${data.orgaoJulgador}`;
    if (!proc.type || proc.type === 'A definir') proc.type = data.classe;
    if (!proc.area || proc.area === 'Outros') proc.area = data.area;
    proc.datajudLastSync = Date.now();
    proc.datajudData = {
      classe: data.classe,
      assuntos: data.assuntos,
      valorCausa: data.valorCausa,
      dataAjuizamento: data.dataAjuizamento,
      sistema: data.sistema,
      grau: data.grau,
      formato: data.formato,
      movimentos: data.movimentos
    };
    proc.updatedAt = Date.now();
    
    await DB.saveProcess(proc);
    
    // Adiciona movimentações como eventos se ainda não existem
    let novosEventos = 0;
    const eventosExistentes = await DB.getEventsByProcess(proc.id);
    const codsExistentes = new Set(eventosExistentes
      .filter(e => e.datajudCodigo)
      .map(e => `${e.datajudCodigo}-${e.date}`));
    
    for (const mov of data.movimentos.slice(0, 30)) {
      const key = `${mov.codigo}-${mov.data}`;
      if (codsExistentes.has(key)) continue;
      const event = {
        id: uid(),
        processId: proc.id,
        eventNumber: 'DJ-' + (mov.data || ''),
        type: mov.nome,
        date: mov.data ? formatDate(mov.data) : '',
        startPage: 0, endPage: 0, pageCount: 0,
        sourceFile: 'DataJud',
        datajudCodigo: mov.codigo,
        complemento: mov.complemento,
        addedAt: Date.now()
      };
      await DB.saveEvent(event);
      novosEventos++;
    }
    
    if (progressModal && progressModal.remove) progressModal.remove();
    toast('Atualizado',
      `${data.tribunal} · ${novosEventos > 0 ? novosEventos + ' eventos novos' : 'nenhum evento novo'}`,
      'success');
    
    // Re-render se estiver na tela do processo
    if (state.currentRoute === 'process' && state.currentProcessId === processId) {
      renderProcessDetail();
    } else if (state.currentRoute === 'processes') {
      renderProcessList();
    }
  } catch (err) {
    if (progressModal && progressModal.remove) progressModal.remove();
    toast('Erro ao atualizar', err.message, 'error');
  }
}

// Try direct call first, fallback to user-configured worker URL
async function djenFetch(params) {
  const workerUrl = await DB.getSetting('djenWorkerUrl', null);
  const baseUrl = workerUrl || DJEN_API_DIRECT;
  const qs = new URLSearchParams(params).toString();
  const url = `${baseUrl}?${qs}`;
  const resp = await fetch(url, { method: 'GET', headers: { 'Accept': 'application/json' } });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
  return await resp.json();
}

// Normalize CNJ to canonical form (with separators)
function normalizeCnj(raw) {
  if (!raw) return null;
  const digits = String(raw).replace(/\D/g, '');
  if (digits.length !== 20) return digits; // return as-is if not standard length
  return `${digits.slice(0,7)}-${digits.slice(7,9)}.${digits.slice(9,13)}.${digits.slice(13,14)}.${digits.slice(14,16)}.${digits.slice(16,20)}`;
}

function normalizeCnjForCompare(raw) {
  return String(raw || '').replace(/\D/g, '');
}

// Calculate prazo: publication is considered effective the next business day
// after disponibilizacao. Prazo starts the next business day after publication.
// We just compute deadlineDate = addBusinessDays(publicationDate + 1bd, daysAllowed)
function calcDjenDeadline(dataDisponibilizacao, daysAllowed = 15) {
  const dispo = new Date(dataDisponibilizacao + 'T12:00:00');
  const publication = addBusinessDays(dispo, 1);
  const startCount = addBusinessDays(publication, 1);
  // startCount IS day 1 of the prazo, so we add daysAllowed-1 more business days
  const deadline = addBusinessDays(startCount, daysAllowed - 1);
  return { publication, startCount, deadline };
}

// Fetch publications for all configured OABs in a date range
async function djenFetchAll(oabs, dataInicio, dataFim, progressCb = null) {
  const allPubs = [];
  let total = 0;
  for (let i = 0; i < oabs.length; i++) {
    const oab = oabs[i];
    if (progressCb) progressCb(`Consultando OAB ${oab.numero}/${oab.uf}...`, (i / oabs.length) * 0.9);
    let pagina = 1;
    while (true) {
      try {
        const data = await djenFetch({
          numeroOab: oab.numero,
          ufOab: oab.uf,
          dataDisponibilizacaoInicio: dataInicio,
          dataDisponibilizacaoFim: dataFim,
          itensPorPagina: 100,
          pagina
        });
        const items = data.items || [];
        if (items.length === 0) break;
        items.forEach(item => {
          item._oab = oab;
          allPubs.push(item);
        });
        total += items.length;
        if (items.length < 100) break;
        pagina += 1;
        if (pagina > 20) break; // safety cap
      } catch(err) {
        throw new Error(`Falha na OAB ${oab.numero}/${oab.uf}: ${err.message}`);
      }
    }
  }
  if (progressCb) progressCb('Processando...', 0.95);
  return allPubs;
}

// Match publications against existing processes by CNJ
async function djenClassify(publications) {
  const processes = await DB.getAllProcesses();
  const cnjMap = new Map();
  processes.forEach(p => {
    const norm = normalizeCnjForCompare(p.cnj);
    if (norm) cnjMap.set(norm, p);
  });

  const result = { matched: [], unmatched: [], duplicates: [] };

  for (const pub of publications) {
    const cnj = pub.numero_processo || pub.numeroProcesso || '';
    const cnjNorm = normalizeCnjForCompare(cnj);
    pub._cnjNormalized = cnjNorm;
    pub._cnjFormatted = normalizeCnj(cnj);
    pub._proc = cnjMap.get(cnjNorm) || null;

    // Dedup check
    if (await DB.hasDjenPublication(pub.hash)) {
      result.duplicates.push(pub);
    } else if (pub._proc) {
      result.matched.push(pub);
    } else {
      result.unmatched.push(pub);
    }
  }
  return result;
}

          <div style="font-size:13px; color: var(--uc-graphite); margin-bottom: 4px;">
            <strong>${escapeHtml(orgao)}</strong> · ${escapeHtml(data)}
          </div>
          <div style="font-size:12px; color: var(--uc-warm-gray); line-height:1.5; max-height:60px; overflow:hidden;">
            ${escapeHtml(textoPreview)}${pub.texto && pub.texto.length > 280 ? '…' : ''}
          </div>
          ${kind === 'unmatched' ? `
            <div style="margin-top: 8px; font-size: 11px;">
              <label style="display:inline-flex; align-items:center; gap:4px;">
                <input type="checkbox" data-djen-create-process checked>
                Criar processo na importação
              </label>
              <button class="btn btn-ghost btn-sm datajud-enrich-btn" onclick="datajudEnrichDjenPub('${pub.hash}')" style="margin-left: 12px; padding: 2px 8px; font-size: 11px; font-variant: normal;" title="Buscar dados completos do processo no DataJud antes de importar">🔍 DataJud</button>
            </div>
          ` : ''}
          <div style="margin-top: 6px; font-size: 11px;">
            <label style="display:inline-flex; align-items:center; gap:6px;">
              Prazo (dias úteis):
              <input type="number" data-djen-prazo value="15" min="1" max="365" style="width: 60px; padding: 2px 6px; border: 1px solid var(--uc-line); border-radius: 4px;">
            </label>
          </div>
        </div>
      </div>
    </div>
  `;
}

// Extrai partes (polo ativo/passivo) e advogados/OABs do texto da publicação DJEN
// O texto típico tem formato:
//   POLO ATIVO: NOME DA PARTE
//   REPRESENTANTES POLO ATIVO: ADVOGADO X - OAB/UF NUMERO, ADVOGADO Y - OAB/UF NUMERO
//   POLO PASSIVO: NOME DA PARTE
//   REPRESENTANTES POLO PASSIVO: ADVOGADO Z - OAB/UF NUMERO
function djenParsePartes(texto) {
  if (!texto) return null;
  const result = {
    poloAtivo: [],
    poloPassivo: [],
    advogadosAtivo: [],
    advogadosPassivo: []
  };

  // Captura POLO ATIVO até REPRESENTANTES, POLO PASSIVO ou final do texto
  const reAtivo = /POLO\s+ATIVO\s*:?\s*([\s\S]+?)(?=\s+REPRESENTANTES\s+POLO|\s+POLO\s+PASSIVO|\s+ADVOGADO|$)/i;
  const mAtivo = texto.match(reAtivo);
  if (mAtivo) {
    result.poloAtivo = mAtivo[1].split(/\s*[;,]\s*|\s+e\s+(?=[A-ZÁÉÍÓÚÂÊÔÃÕÇ])/)
      .map(s => s.trim().replace(/\s{2,}/g, ' '))
      .filter(s => s.length > 2 && s.length < 200);
  }

  const rePassivo = /POLO\s+PASSIVO\s*:?\s*([\s\S]+?)(?=\s+REPRESENTANTES\s+POLO|\s+POLO\s+ATIVO|\s+ADVOGADO|$)/i;
  const mPassivo = texto.match(rePassivo);
  if (mPassivo) {
    result.poloPassivo = mPassivo[1].split(/\s*[;,]\s*|\s+e\s+(?=[A-ZÁÉÍÓÚÂÊÔÃÕÇ])/)
      .map(s => s.trim().replace(/\s{2,}/g, ' '))
      .filter(s => s.length > 2 && s.length < 200);
  }

  // Advogados POLO ATIVO
  const reAdvAtivo = /REPRESENTANTES?\s+POLO\s+ATIVO\s*:?\s*([\s\S]+?)(?=\s+POLO\s+PASSIVO|\s+REPRESENTANTES?\s+POLO|$)/i;
  const mAdvAtivo = texto.match(reAdvAtivo);
  if (mAdvAtivo) {
    result.advogadosAtivo = djenParseAdvogados(mAdvAtivo[1]);
  }

  // Advogados POLO PASSIVO
  const reAdvPassivo = /REPRESENTANTES?\s+POLO\s+PASSIVO\s*:?\s*([\s\S]+?)(?=\s+POLO\s+ATIVO|\s+REPRESENTANTES?\s+POLO|$)/i;
  const mAdvPassivo = texto.match(reAdvPassivo);
  if (mAdvPassivo) {
    result.advogadosPassivo = djenParseAdvogados(mAdvPassivo[1]);
  }

  return result;
}

function djenParseAdvogados(trecho) {
  if (!trecho) return [];
  const advs = [];
  // Padrão: NOME ADVOGADO - OAB/UF 12345 ou NOME - OAB UF 12345
  const re = /([A-ZÁÉÍÓÚÂÊÔÃÕÇ][A-ZÁÉÍÓÚÂÊÔÃÕÇ\s\.]{4,80}?)\s*[\-—–]\s*(?:OAB[\s/\.\-]*|N[ºo°]\s*)?([A-Z]{2})\s*[\.\-/]?\s*(\d{2,7})/gi;
  let m;
  while ((m = re.exec(trecho)) !== null) {
    const nome = m[1].trim().replace(/\s{2,}/g, ' ');
    const uf = m[2].toUpperCase();
    const numero = m[3];
    if (nome.length > 5 && nome.length < 80 && /^[A-ZÁÉÍÓÚÂÊÔÃÕÇ]/.test(nome)) {
      advs.push({ nome, oab: `OAB/${uf} ${numero}`, uf, numero });
    }
  }
  return advs;
}

// Aplica os dados extraídos da publicação no processo associado, sem sobrescrever
// dados já preenchidos manualmente
async function djenEnrichProcessFromPublication(processId, pub) {
  if (!processId || !pub.texto) return;
  const proc = await DB.getProcess(processId);
  if (!proc) return;

  const partes = djenParsePartes(pub.texto);
  if (!partes) return;

  let changed = false;

  // Atribui partes apenas se não houver
  if (!proc.partes) {
    proc.partes = {};
  }
  if (!proc.partes.ativo && partes.poloAtivo.length) {
    proc.partes.ativo = partes.poloAtivo;
    changed = true;
  }
  if (!proc.partes.passivo && partes.poloPassivo.length) {
    proc.partes.passivo = partes.poloPassivo;
    changed = true;
  }

  // Advogados — sempre acumula (set para evitar duplicatas)
  if (!proc.advogados) {
    proc.advogados = { ativo: [], passivo: [] };
  }
  const seenAtivo = new Set((proc.advogados.ativo || []).map(a => a.oab));
  for (const adv of partes.advogadosAtivo) {
    if (!seenAtivo.has(adv.oab)) {
      proc.advogados.ativo.push(adv);
      seenAtivo.add(adv.oab);
      changed = true;
    }
  }
  const seenPassivo = new Set((proc.advogados.passivo || []).map(a => a.oab));
  for (const adv of partes.advogadosPassivo) {
    if (!seenPassivo.has(adv.oab)) {
      proc.advogados.passivo.push(adv);
      seenPassivo.add(adv.oab);
      changed = true;
    }
  }

  // Se cliente ainda não foi preenchido, sugere a partir do polo correto
  // (assumindo que o cliente é do polo da defesa ou ataque conforme cadastrado)
  if (!proc.client && proc.polo) {
    const meuPolo = proc.polo === 'Ataque' ? partes.poloAtivo : partes.poloPassivo;
    if (meuPolo && meuPolo.length) {
      proc.client = meuPolo[0]; // primeira parte do nosso polo
      changed = true;
    }
  }

  if (changed) {
    proc.updatedAt = Date.now();
    await DB.saveProcess(proc);
  }
}

// Re-extrai partes/advogados de TODAS as publicações DJEN já importadas para o processo
// Útil quando o processo foi cadastrado antes desta funcionalidade existir
async function djenReExtractParties(processId) {
  const proc = await DB.getProcess(processId);
  if (!proc) return;

  // Buscar todas as publicações DJEN deste processo
  const pubs = await DB.getDjenPublicationsByProcess(processId);
  if (!pubs || pubs.length === 0) {
    toast('Nenhuma publicação DJEN', 'Este processo não tem publicações DJEN importadas. Importe via "Buscar DJEN" no dashboard.', 'error');
    return;
  }

  // Limpa partes/advogados anteriores para re-extrair limpo
  proc.partes = { ativo: [], passivo: [] };
  proc.advogados = { ativo: [], passivo: [] };

  let extraidasDe = 0;
  for (const pub of pubs) {
    if (pub.texto) {
      const partes = djenParsePartes(pub.texto);
      if (partes) {
        // Adiciona partes (sem duplicar)
        for (const p of partes.poloAtivo) {
          if (!proc.partes.ativo.includes(p)) proc.partes.ativo.push(p);
        }
        for (const p of partes.poloPassivo) {
          if (!proc.partes.passivo.includes(p)) proc.partes.passivo.push(p);
        }
        const seenA = new Set(proc.advogados.ativo.map(a => a.oab));
        for (const adv of partes.advogadosAtivo) {
          if (!seenA.has(adv.oab)) { proc.advogados.ativo.push(adv); seenA.add(adv.oab); }
        }
        const seenP = new Set(proc.advogados.passivo.map(a => a.oab));
        for (const adv of partes.advogadosPassivo) {
          if (!seenP.has(adv.oab)) { proc.advogados.passivo.push(adv); seenP.add(adv.oab); }
        }
        extraidasDe++;
      }
    }
  }

  // Se cliente vazio e temos polo, tenta inferir
  if (!proc.client && proc.polo) {
    const meuPolo = proc.polo === 'Ataque' ? proc.partes.ativo : proc.partes.passivo;
    if (meuPolo && meuPolo.length) {
      proc.client = meuPolo[0];
    }
  }

  proc.updatedAt = Date.now();
  await DB.saveProcess(proc);

  const totalPartes = proc.partes.ativo.length + proc.partes.passivo.length;
  const totalAdvs = proc.advogados.ativo.length + proc.advogados.passivo.length;
  if (totalPartes === 0 && totalAdvs === 0) {
    toast('Nada a extrair',
      `Vasculhei ${pubs.length} publicação(ões) mas não encontrei "POLO ATIVO/PASSIVO" no texto delas.`,
      'error');
  } else {
    toast('Partes extraídas',
      `${totalPartes} parte(s), ${totalAdvs} advogado(s) — de ${extraidasDe} publicação(ões)`,
      'success');
  }
  renderProcessDetail();
}

async function djenImportSelected(modal) {
  const classified = window._djenClassifiedCache || { matched: [], unmatched: [] };
  const allPubs = [...classified.matched, ...classified.unmatched];
  let imported = 0, processosCriados = 0, prazosCriados = 0;

  // Collect selected hashes + per-row config
  const rowSettings = {};
  modal.querySelectorAll('[data-djen-id]').forEach(card => {
    const hash = card.dataset.djenId;
    const checkbox = card.querySelector('[data-djen-row]');
    const prazoInput = card.querySelector('[data-djen-prazo]');
    const createProcCheckbox = card.querySelector('[data-djen-create-process]');
    rowSettings[hash] = {
      selected: checkbox?.checked,
      prazo: parseInt(prazoInput?.value || '15'),
      createProcess: createProcCheckbox?.checked ?? false
    };
  });

  for (const pub of allPubs) {
    const cfg = rowSettings[pub.hash];
    if (!cfg || !cfg.selected) continue;

    let processId = pub._proc?.id;

    // If unmatched and user wants to create the process
    if (!processId && cfg.createProcess) {
      const newProc = djenInferProcessFromPublication(pub);
      await DB.saveProcess(newProc);
      processId = newProc.id;
      processosCriados++;
    }

    // Save publication record (always, for dedup)
    const dataDispo = pub.data_disponibilizacao || pub.data_publicacao;
    await DB.saveDjenPublication({
      hash: pub.hash,
      cnj: pub._cnjNormalized,
      processId: processId || null,
      tribunal: pub.siglaTribunal || pub.tribunal || '',
      orgao: pub.nomeOrgao || pub.orgao || '',
      tipo: pub.tipoComunicacao || 'Intimação',
      dataDisponibilizacao: dataDispo,
      texto: pub.texto || '',
      link: pub.link || '',
      oab: pub._oab,
      raw: pub,
      status: processId ? 'imported' : 'orphan',
      importedAt: Date.now()
    });
    imported++;

    // Enriquecer processo com partes/advogados extraídos do texto da publicação
    if (processId && pub.texto) {
      await djenEnrichProcessFromPublication(processId, pub);
    }

    // Create deadline if linked to process
    if (processId && dataDispo) {
      const calc = calcDjenDeadline(dataDispo, cfg.prazo);
      const deadline = {
        id: uid(),
        processId,
        description: `[DJEN] ${pub.tipoComunicacao || 'Intimação'} · ${pub.nomeOrgao || pub.orgao || ''}`.slice(0, 200),
        type: 'djen',
        intimationDate: calc.publication.toISOString(),
        daysAllowed: cfg.prazo,
        deadlineDate: calc.deadline.toISOString(),
        status: 'pending',
        djenHash: pub.hash,
        createdAt: Date.now()
      };
      await DB.saveDeadline(deadline);
      prazosCriados++;

      // Also create event in process timeline
      const event = {
        id: uid(),
        processId,
        eventNumber: 'DJEN-' + dataDispo,
        type: pub.tipoComunicacao || 'Intimação DJEN',
        date: formatDate(calc.publication),
        startPage: 0, endPage: 0, pageCount: 0,
        sourceFile: 'DJEN',
        djenHash: pub.hash,
        addedAt: Date.now()
      };
      await DB.saveEvent(event);
    }
  }

  modal.remove();
  await DB.setSetting('djenLastFetch', Date.now());
  toast('DJEN importado',
    `${imported} publicações · ${processosCriados} processos novos · ${prazosCriados} prazos criados`,
    'success');
  // Reload current view
  if (state.currentRoute === 'dashboard') renderDashboard();
  else if (state.currentRoute === 'deadlines') renderDeadlines();
  else if (state.currentRoute === 'processes') renderProcessList();
}

// Try to extract a meaningful name and metadata from a DJEN publication
function djenInferProcessFromPublication(pub) {
  const cnj = pub._cnjFormatted || pub.numero_processo;
  const tribunal = pub.siglaTribunal || pub.tribunal || '';
  const orgao = pub.nomeOrgao || pub.orgao || '';
  // Extract polo ativo from text if possible
  let cliente = '';
  const m = (pub.texto || '').match(/POLO\s+ATIVO\s*:?\s*([^\n]+?)(?:\s+REPRESENTANTES|\s+POLO\s+PASSIVO|$)/i);
  if (m) cliente = m[1].trim().replace(/\s{2,}/g, ' ').slice(0, 80);
  // Try to detect area from tribunal
  let area = 'Outros';
  if (/TRF|JF/i.test(tribunal)) area = 'Tributário';
  else if (/TJ/i.test(tribunal) && /fazenda|fiscal/i.test(orgao)) area = 'Execução Fiscal';
  else if (/TJ/i.test(tribunal)) area = 'Cível';
  return {
    id: uid(),
    name: `${cliente || 'Processo'} · ${cnj}`.slice(0, 100),
    cnj,
    client: cliente || null,
    court: `${tribunal}${orgao ? ' · ' + orgao : ''}`.trim(),
    area,
    type: pub.tipoComunicacao || 'A definir',
    polo: 'A definir',
    status: 'active',
    eventCount: 0,
    noteCount: 0,
    source: 'djen-auto'
  };
}

// === MAIN ENTRY POINT: triggered from Dashboard button ===
async function djenRunSearch() {
  // Load config
  const allOabs = await DB.getSetting('djenOabs', DJEN_DEFAULT_OABS);
  if (!allOabs || allOabs.length === 0) {
    toast('Cadastre OABs primeiro', 'Vá em Configurações → DJEN', 'error');
    state._settingsTab = 'djen';
    navigate('settings');
    return;
  }
  // Filter only enabled OABs (default true if field absent)
  const oabs = allOabs.filter(o => o.enabled !== false);
  if (oabs.length === 0) {
    toast('Nenhuma OAB selecionada',
      `Você tem ${allOabs.length} OAB(s) cadastrada(s) mas todas estão desmarcadas. Vá em Configurações → DJEN para marcar pelo menos uma.`,
      'error');
    state._settingsTab = 'djen';
    navigate('settings');
    return;
  }
  const lookbackDays = await DB.getSetting('djenLookbackDays', 7);

  // Date range — last N days, ending yesterday (DJEN doesn't return today's data reliably)
  const today = new Date();
  const fim = new Date(today); fim.setDate(today.getDate() - 1);
  const inicio = new Date(today); inicio.setDate(today.getDate() - lookbackDays);
  const fmtDate = d => d.toISOString().slice(0, 10);

  // Show progress modal
  const modal = document.createElement('div');
  modal.className = 'modal-backdrop';
  modal.innerHTML = `
    <div class="modal" style="max-width: 480px;">
      <h3 class="modal-title">Consultando DJEN…</h3>
      <div class="flex items-center gap-3" style="margin-bottom: 12px;">
        <div class="spinner"></div>
        <div>
          <div id="djenProgressMsg" style="font-weight: 600;">Iniciando…</div>
          <div class="help-text">Período: ${formatDate(inicio)} a ${formatDate(fim)} · ${lookbackDays} dia(s)</div>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar-bg"><div class="progress-bar-fg" id="djenProgressBar"></div></div>
      </div>
      <p class="help-text" style="margin-top:12px;">
        Consultando ${oabs.length} de ${allOabs.length} OAB(s):<br>
        ${oabs.map(o => `<span class="badge badge-gold">${escapeHtml(o.numero)}/${escapeHtml(o.uf)}</span>`).join(' ')}
      </p>
    </div>`;
  $('modalContainer').appendChild(modal);
  const progressCb = (msg, pct) => {
    const m = document.getElementById('djenProgressMsg');
    const b = document.getElementById('djenProgressBar');
    if (m) m.textContent = msg;
    if (b) b.style.width = (pct * 100) + '%';
  };

  try {
    const pubs = await djenFetchAll(oabs, fmtDate(inicio), fmtDate(fim), progressCb);
    const classified = await djenClassify(pubs);
    modal.remove();
    await djenShowResultsModal(classified, oabs, fmtDate(inicio), fmtDate(fim));
  } catch(err) {
    modal.remove();
    djenShowError(err);
  }
}

function djenShowError(err) {
  const isCors = /CORS|Failed to fetch|NetworkError|access-control/i.test(err.message);
  const modal = document.createElement('div');
  modal.className = 'modal-backdrop';
  modal.innerHTML = `
    <div class="modal" style="max-width: 600px;">
      <h3 class="modal-title" style="color: var(--uc-red);">⚠ Erro na consulta DJEN</h3>
      <pre style="background: var(--uc-cream); padding: 10px; border-radius: 4px; font-size: 12px; white-space: pre-wrap; margin-bottom: 12px;">${escapeHtml(err.message)}</pre>
      ${isCors ? `
        <div class="callout warn" style="background: var(--uc-amber-soft); border: 1px solid var(--uc-amber); border-left: 4px solid var(--uc-amber); padding: 12px; border-radius: 4px; margin: 12px 0;">
          <strong>Diagnóstico:</strong> a API do CNJ provavelmente bloqueou a chamada direta do navegador (CORS).
          <br><br>
          <strong>Solução em 5 min:</strong> publicar uma <em>Cloudflare Worker</em> (gratuita) que repassa as chamadas. Veja instruções em Configurações → DJEN.
        </div>
        <button class="btn btn-primary" id="_djenGoSettings" style="width:100%; margin-bottom:8px;">Ir para Configurações → DJEN</button>
      ` : ''}
      <button class="btn btn-outline" id="_djenErrClose" style="width:100%;">Fechar</button>
    </div>`;
  $('modalContainer').appendChild(modal);
  document.getElementById('_djenErrClose').onclick = () => modal.remove();
  const goBtn = document.getElementById('_djenGoSettings');
  if (goBtn) goBtn.onclick = () => {
    modal.remove();
    state._settingsTab = 'djen';
    navigate('settings');
  };
}

// ====================================================================
// === APP INITIALIZATION =============================================
// ====================================================================

async function bootApp() {
  // Auth gate: bloqueia o app até o usuário entrar com Google e estar na allowlist.
  try {
    await UC_Auth.requireSignIn();
  } catch (err) {
    document.body.innerHTML = `<div style="padding: 40px; text-align: center;"><h1>Falha de login</h1><p>${escapeHtml(err.message)}</p></div>`;
    return;
  }

  // openDB() ainda roda — usado pelos prompts (templates de IA, kept local).
  try {
    await openDB();
  } catch(err) {
    document.body.innerHTML = `<div style="padding: 40px; text-align: center;"><h1>Erro ao abrir banco de dados local</h1><p>${escapeHtml(err.message)}</p></div>`;
    return;
  }

  // Substitui as implementações IndexedDB pelas remotas (Sheets via Apps Script).
  // O binding `const DB` permanece; só os métodos são trocados.
  Object.assign(DB, window.UC_RemoteDB);

  // Load settings
  state.settings.theme = await DB.getSetting('theme', 'light');
  state.settings.backupReminder = await DB.getSetting('backupReminder', true);
  state.settings.lastBackupAt = await DB.getSetting('lastBackupAt', null);
  applyTheme(state.settings.theme);

  // Seed default prompt if none exists
  const prompts = (await DB.getAllPrompts()) || [];
  if (prompts.length === 0) {
    const id = uid();
    await DB.savePrompt({ id, name: 'Análise sênior (padrão do escritório)', content: DEFAULT_PROMPT_TEMPLATE, createdAt: Date.now() });
    await DB.setSetting('defaultPromptId', id);
  }

  // Seed default DJEN OABs on first run
  const existingOabs = await DB.getSetting('djenOabs', null);
  if (!existingOabs) {
    await DB.setSetting('djenOabs', DJEN_DEFAULT_OABS);
  }

  // Setup nav clicks
  document.querySelectorAll('[data-route]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      navigate(el.dataset.route);
    });
  });

  // Initial route
  const { route, ...params } = parseHash();
  Object.assign(state, params);
  navigate(route, params);

  // Service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  }

  // PWA install prompt
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    state.installPrompt = e;
  });
}

// Start
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', bootApp);
} else {
  bootApp();
}
